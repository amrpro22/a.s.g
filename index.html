<body>
<div id="appRoot" class="app-container">
    <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> جاري تحميل البيانات...</div>
</div>

<script>
    let shopsData = [];
    let attendanceRecords = [];
    let currentView = 'home'; // home, shop, employee
    
    function generateAccessCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    function calculateHoursBetween(checkinTime, checkoutTime) {
        const date1 = new Date(checkinTime);
        const date2 = new Date(checkoutTime);
        const diffHours = (date2 - date1) / (1000 * 60 * 60);
        return Math.round(diffHours * 10) / 10;
    }
    
    async function calculateWorkHoursForEmployee(employeeName, branchName) {
        const employeeRecords = attendanceRecords.filter(r => 
            r.employeeName === employeeName && r.branchName === branchName
        ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        
        const dailyHours = {
            "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0, "الأحد": 0
        };
        
        const dayNames = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        
        for (let i = 0; i < employeeRecords.length - 1; i++) {
            if (employeeRecords[i].type === 'دخول' && employeeRecords[i+1].type === 'خروج') {
                const date = new Date(employeeRecords[i].timestamp);
                const dayIndex = date.getDay();
                const dayName = dayNames[dayIndex];
                const hours = calculateHoursBetween(employeeRecords[i].timestamp, employeeRecords[i+1].timestamp);
                if (hours > 0 && hours < 24) {
                    dailyHours[dayName] = Math.round((dailyHours[dayName] + hours) * 10) / 10;
                }
            }
        }
        
        return dailyHours;
    }
    
    async function updateAllEmployeesWorkHours() {
        for (let shop of shopsData) {
            if (shop.employees) {
                for (let emp of shop.employees) {
                    emp.workHours = await calculateWorkHoursForEmployee(emp.name, shop.name);
                }
            }
        }
        await saveDataToFirebase();
    }
    
    async function saveDataToFirebase() {
        if (!window.firebaseDB) return;
        try {
            const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
            await window.firebaseSet(dbRef, shopsData);
        } catch (error) {
            console.warn("خطأ في حفظ البيانات:", error.message);
        }
    }
    
    async function saveAttendanceToFirebase() {
        if (!window.firebaseDB || !attendanceRecords.length) return;
        try {
            const attendanceRef = window.firebaseRef(window.firebaseDB, 'attendanceRecords');
            const recordsObj = {};
            attendanceRecords.forEach(record => {
                if (record.id) recordsObj[record.id] = record;
            });
            await window.firebaseSet(attendanceRef, recordsObj);
        } catch (error) {
            console.warn("خطأ في حفظ سجل الحضور:", error.message);
        }
    }
    
    async function loadDataFromFirebase() {
        if (!window.firebaseDB) return null;
        try {
            const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
            const snapshot = await window.firebaseGet(dbRef);
            if (snapshot.exists()) return snapshot.val();
            return null;
        } catch (error) {
            console.warn("خطأ في جلب البيانات:", error.message);
            return null;
        }
    }
    
    async function loadAttendanceFromFirebase() {
        if (!window.firebaseDB) return [];
        try {
            const attendanceRef = window.firebaseRef(window.firebaseDB, 'attendanceRecords');
            const snapshot = await window.firebaseGet(attendanceRef);
            const records = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) {
                    records.push({ id: key, ...data[key] });
                }
            }
            records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            return records;
        } catch (error) {
            console.warn("خطأ في جلب سجل الحضور:", error.message);
            return [];
        }
    }
    
    function getDefaultShopsData() {
        const emptyHours = { "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0, "الأحد": 0 };
        return [
            { id: 1, name: "متجر الأندلس", icon: "fas fa-crown", desc: "أفخر التشكيلات", employees: [
                { name: "أحمد الشجاع", accessCode: "111111", workHours: {...emptyHours} },
                { name: "سارة المنصور", accessCode: "222222", workHours: {...emptyHours} }
            ]},
            { id: 2, name: "رواد الخليج", icon: "fas fa-ship", desc: "ريادة في البحر", employees: [
                { name: "خالد النقبي", accessCode: "333333", workHours: {...emptyHours} },
                { name: "لينا العتيبي", accessCode: "444444", workHours: {...emptyHours} }
            ]},
            { id: 3, name: "زهور الشجاع", icon: "fas fa-leaf", desc: "طبيعة ورفاهية", employees: [
                { name: "ريم الهاجري", accessCode: "555555", workHours: {...emptyHours} },
                { name: "ناصر العتيق", accessCode: "666666", workHours: {...emptyHours} }
            ]},
            { id: 4, name: "الدرة بلازا", icon: "fas fa-gem", desc: "فخامة وتميز", employees: [
                { name: "جمال السالم", accessCode: "777777", workHours: {...emptyHours} },
                { name: "هبة العبيد", accessCode: "888888", workHours: {...emptyHours} }
            ]},
            { id: 5, name: "نخبة الشرق", icon: "fas fa-chart-line", desc: "ريادة أعمال", employees: [
                { name: "ماجد الشهراني", accessCode: "999999", workHours: {...emptyHours} },
                { name: "نوال الغامدي", accessCode: "101010", workHours: {...emptyHours} }
            ]},
            { id: 6, name: "قمة الشجاع", icon: "fas fa-mountain", desc: "أعلى القمم", employees: [
                { name: "تركي العتيبي", accessCode: "111111", workHours: {...emptyHours} },
                { name: "جواهر القاسم", accessCode: "121212", workHours: {...emptyHours} }
            ]}
        ];
    }
    
    function showEditShopModal(shop, callback) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="edit-modal">
                <h3><i class="fas fa-edit"></i> تعديل اسم المحل</h3>
                <input type="text" id="editShopName" value="${shop.name.replace(/"/g, '&quot;')}" placeholder="أدخل الاسم الجديد">
                <div class="modal-buttons">
                    <button class="modal-save"><i class="fas fa-check"></i> حفظ</button>
                    <button class="modal-cancel"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#editShopName');
        input.focus();
        
        modal.querySelector('.modal-save').addEventListener('click', async () => {
            const newName = input.value.trim();
            if (newName && newName !== shop.name) {
                shop.name = newName;
                await saveDataToFirebase();
                if (callback) callback();
            }
            modal.remove();
        });
        
        modal.querySelector('.modal-cancel').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function addScrollEffect() {
        const header = document.querySelector('.main-header');
        if (header) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 10) header.classList.add('scrolled');
                else header.classList.remove('scrolled');
            });
        }
    }
    
    function renderHomePage() {
        currentView = 'home';
        if (!shopsData.length) return;
        const root = document.getElementById('appRoot');
        let shopOptions = '';
        shopsData.forEach(shop => { shopOptions += `<option value="${shop.id}">${shop.name}</option>`; });
        let shopsHtml = '';
        shopsData.forEach(shop => {
            const totalEmployees = shop.employees?.length || 0;
            shopsHtml += `<div class="shop-card" data-shop-id="${shop.id}">
                <div class="shop-icon"><i class="${shop.icon}"></i></div>
                <div class="shop-info">
                    <div class="shop-name-wrapper">
                        <div class="shop-name">${shop.name}</div>
                        <button class="edit-shop-btn" data-shop-id="${shop.id}" onclick="event.stopPropagation()"><i class="fas fa-pen"></i> تعديل</button>
                    </div>
                    <div class="shop-desc"><i class="fas fa-users" style="font-size:0.8rem; margin-left:3px;"></i> عدد الموظفين: ${totalEmployees} | ${shop.desc}</div>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </div>`;
        });
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-name">الشجاع جروب</div>
                <div class="subhead">نظام إدارة الموظفين - ساعات العمل المحسوبة تلقائياً</div>
                <div class="dashboard-badge"><i class="fas fa-wifi"></i> متصل بـ Firebase</div>
                <div class="back-button hidden" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="add-employee-form">
                <div class="form-title"><i class="fas fa-user-plus"></i><span>إضافة موظف جديد</span></div>
                <div class="form-row">
                    <input type="text" id="newEmployeeName" class="form-input" placeholder="اكتب اسم الموظف هنا...">
                    <select id="newEmployeeShop" class="form-select">${shopOptions}</select>
                    <button id="addEmployeeBtn" class="btn-add"><i class="fas fa-plus-circle"></i> إضافة الآن</button>
                </div>
            </div>
            
            <div class="section-title"><i class="fas fa-building"></i> المتاجر والفروع</div>
            ${shopsHtml}
            <footer><i class="fas fa-chart-line"></i> يتم احتساب ساعات العمل تلقائياً من تسجيلات الدخول والخروج | جميع البيانات محفوظة في السحابة</footer>
        `;
        root.innerHTML = html;
        addScrollEffect();
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.add('hidden');
        
        document.getElementById('addEmployeeBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('newEmployeeName');
            const shopSelect = document.getElementById('newEmployeeShop');
            const employeeName = nameInput.value.trim();
            const shopId = parseInt(shopSelect.value);
            if (!employeeName) { alert('الرجاء إدخال اسم الموظف أولاً'); return; }
            const shop = shopsData.find(s => s.id === shopId);
            if (shop) {
                const emptyHours = { "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0, "الأحد": 0 };
                shop.employees.push({ 
                    name: employeeName, 
                    accessCode: generateAccessCode(),
                    workHours: {...emptyHours}
                });
                await saveDataToFirebase();
                renderHomePage();
                alert(`تم بنجاح إضافة الموظف: ${employeeName}\n\nرمز الدخول: ${generateAccessCode()}`);
            }
        });
        
        document.querySelectorAll('.shop-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.edit-shop-btn')) {
                    renderShopPage(parseInt(card.getAttribute('data-shop-id')));
                }
            });
        });
        
        document.querySelectorAll('.edit-shop-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const shopId = parseInt(btn.getAttribute('data-shop-id'));
                const shop = shopsData.find(s => s.id === shopId);
                if (shop) showEditShopModal(shop, () => renderHomePage());
            });
        });
    }
    
    function renderShopPage(shopId) {
        currentView = 'shop';
        const shop = shopsData.find(s => s.id === shopId);
        if (!shop) return;
        let employeesHtml = '';
        shop.employees.forEach((emp, idx) => {
            const totalHours = Object.values(emp.workHours || {}).reduce((a, b) => a + b, 0);
            employeesHtml += `
            <div class="employee-card" data-emp-index="${idx}" data-shop-id="${shop.id}">
                <div class="employee-avatar"><i class="fas fa-user-tie"></i></div>
                <div class="employee-details">
                    <div class="employee-name">${emp.name}</div>
                    <div class="employee-hours">
                        <span><i class="fas fa-clock"></i> إجمالي الساعات المسجلة: ${totalHours.toFixed(1)} ساعة</span>
                    </div>
                    <div class="employee-pin"><i class="fas fa-key"></i> رمز الدخول: ${emp.accessCode}</div>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </div>`;
        });
        
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-name" style="font-size: 1.8rem;">${shop.name}</div>
                <div class="subhead">إدارة طاقم العمل وساعات العمل</div>
                <div class="back-button" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="shop-header">
                <div class="shop-title"><i class="${shop.icon}"></i> ${shop.name}</div>
                <div style="color:var(--primary); font-weight:700;"><i class="fas fa-users"></i> ${shop.employees.length} موظف</div>
            </div>
            
            <div class="section-title"><i class="fas fa-id-card-clip"></i> قائمة الموظفين</div>
            ${employeesHtml}
            
            <footer><i class="fas fa-chart-line"></i> ساعات العمل محسوبة تلقائياً من تسجيلات الحضور | ${shop.name}</footer>
        `;
        document.getElementById('appRoot').innerHTML = html;
        addScrollEffect();
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.remove('hidden');
        backBtn.addEventListener('click', () => renderHomePage());
        
        document.querySelectorAll('.employee-card').forEach(card => {
            card.addEventListener('click', () => {
                const empIndex = parseInt(card.getAttribute('data-emp-index'));
                const sId = parseInt(card.getAttribute('data-shop-id'));
                const targetShop = shopsData.find(s => s.id === sId);
                if (targetShop && targetShop.employees[empIndex]) renderEmployeePage(targetShop.employees[empIndex], sId, empIndex);
            });
        });
    }
    
    function renderEmployeePage(employee, returnShopId, employeeIndex) {
        currentView = 'employee';
        const totalHours = Object.values(employee.workHours || {}).reduce((a, b) => a + b, 0);
        const weekDays = ["الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت", "الأحد"];
        
        let hoursListHtml = '';
        weekDays.forEach(day => {
            const hoursValue = employee.workHours?.[day] || 0;
            hoursListHtml += `
                <div class="hours-day-item">
                    <span class="hours-day-name">${day}</span>
                    <span class="hours-value">${hoursValue.toFixed(1)} ساعة</span>
                </div>
            `;
        });
        
        const employeeAttendance = attendanceRecords.filter(r => 
            r.employeeName === employee.name
        ).slice(0, 10);
        
        let attendanceHtml = '';
        employeeAttendance.forEach(record => {
            attendanceHtml += `
                <div class="attendance-item">
                    <span class="attendance-type ${record.type === 'دخول' ? 'checkin' : 'checkout'}">
                        <i class="fas ${record.type === 'دخول' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}"></i> ${record.type}
                    </span>
                    <span class="attendance-time">${record.date || new Date(record.timestamp).toLocaleDateString('ar-EG')} | ${record.time || new Date(record.timestamp).toLocaleTimeString('ar-EG')}</span>
                </div>
            `;
        });
        
        if (attendanceHtml === '') attendanceHtml = '<div style="text-align:center; padding:20px; color:#94a3b8;">لا توجد تسجيلات حضور بعد</div>';
        
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-name" style="font-size: 1.6rem;">الملف الشخصي</div>
                <div class="subhead">ساعات العمل المحسوبة تلقائياً</div>
                <div class="back-button" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="employee-profile">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <div class="profile-name">${employee.name}</div>
                <div class="employee-pin" style="margin: 0 auto; display: inline-block;"><i class="fas fa-key"></i> رمز الدخول: ${employee.accessCode}</div>
                <br>
                <div class="total-hours-card">
                    <div class="total-hours-number">${totalHours.toFixed(1)}</div>
                    <div class="total-hours-label">إجمالي ساعات العمل المسجلة</div>
                </div>
                
                <div class="hours-list">
                    <h4><i class="fas fa-calendar-week"></i> ساعات العمل حسب اليوم</h4>
                    ${hoursListHtml}
                </div>
                
                <div class="hours-list">
                    <h4><i class="fas fa-history"></i> آخر تسجيلات الحضور</h4>
                    <div class="attendance-list">
                        ${attendanceHtml}
                    </div>
                </div>
            </div>
            
            <footer><i class="fas fa-sync-alt"></i> يتم تحديث ساعات العمل تلقائياً من كود تسجيل الدخول | بيانات الموظف: ${employee.name}</footer>
        `;
        document.getElementById('appRoot').innerHTML = html;
        addScrollEffect();
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.remove('hidden');
        backBtn.addEventListener('click', () => renderShopPage(returnShopId));
    }
    
    function listenToFirebaseChanges() {
        if (!window.firebaseDB) return;
        
        const shopsRef = window.firebaseRef(window.firebaseDB, 'shopsData');
        window.firebaseOnValue(shopsRef, async (snapshot) => {
            if (snapshot.exists()) shopsData = snapshot.val();
            await updateAllEmployeesWorkHours();
            if (currentView === 'home') renderHomePage();
            else if (currentView === 'shop' && window.currentShopId) renderShopPage(window.currentShopId);
        });
        
        const attendanceRef = window.firebaseRef(window.firebaseDB, 'attendanceRecords');
        window.firebaseOnValue(attendanceRef, async (snapshot) => {
            const records = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) records.push({ id: key, ...data[key] });
            }
            records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            attendanceRecords = records;
            await updateAllEmployeesWorkHours();
            if (currentView === 'home') renderHomePage();
            else if (currentView === 'shop' && window.currentShopId) renderShopPage(window.currentShopId);
            else if (currentView === 'employee' && window.currentEmployeeData) {
                const shop = shopsData.find(s => s.id === window.currentEmployeeShopId);
                if (shop && shop.employees[window.currentEmployeeIndex]) {
                    renderEmployeePage(shop.employees[window.currentEmployeeIndex], window.currentEmployeeShopId, window.currentEmployeeIndex);
                }
            }
        });
    }
    
    let appStarted = false;
    const startApplication = async () => {
        if (appStarted) return;
        appStarted = true;
        
        try {
            const savedShops = await loadDataFromFirebase();
            const savedAttendance = await loadAttendanceFromFirebase();
            attendanceRecords = savedAttendance;
            
            if (savedShops && savedShops.length) {
                shopsData = savedShops;
                let updated = false;
                for (let shop of shopsData) {
                    if (shop.employees) {
                        for (let emp of shop.employees) {
                            if (!emp.accessCode) {
                                emp.accessCode = generateAccessCode();
                                updated = true;
                            }
                            if (!emp.workHours) {
                                emp.workHours = { "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0, "الأحد": 0 };
                                updated = true;
                            }
                        }
                    }
                }
                if (updated) await saveDataToFirebase();
            } else {
                shopsData = getDefaultShopsData();
                await saveDataToFirebase();
            }
            
            await updateAllEmployeesWorkHours();
            listenToFirebaseChanges();
            renderHomePage();
        } catch (error) {
            console.error("خطأ في التهيئة:", error);
            shopsData = getDefaultShopsData();
            renderHomePage();
        }
    };
    
    window.addEventListener('firebaseReady', startApplication);
    
    setTimeout(() => {
        if (!appStarted) {
            console.warn("تأخر Firebase، بدء التشغيل محلياً");
            startApplication();
        }
    }, 3000);
</script>
</body>
</html>
