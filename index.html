    <style>

<body>

<div id="appRoot">
    <div class="loading-screen">

        <p style="margin-top: 15px; font-weight: 700;">جاري تحميل البيانات...</p>

</div>

<script>
    let shopsData = [];
    let attendanceRecords = [];
    let currentView = 'home';
    let currentShopId = null;
    let currentEmployeeData = null;
    let currentEmployeeShopId = null;
    let currentEmployeeIndex = null;

    const availableIconsList = [
        { iconClass: "fas fa-store", label: "متجر عام" },
        { iconClass: "fas fa-shopping-cart", label: "سوبرماركت / عربة تسوق" },
        { iconClass: "fas fa-smoking", label: "محل تدخين / فيب / شيشة" },
        { iconClass: "fas fa-utensils", label: "مطعم مأكولات (شرقية وغربية)" },
        { iconClass: "fas fa-pizza-slice", label: "مطعم وجبات سريعة / بيتزا" },
        { iconClass: "fas fa-mobile-alt", label: "مبيعات جوالات" },
        { iconClass: "fas fa-laptop", label: "إلكترونيات وحواسيب" },
        { iconClass: "fas fa-tshirt", label: "ملابس وأزياء" },
        { iconClass: "fas fa-shoe-prints", label: "أحذية ومستلزمات" },
        { iconClass: "fas fa-gift", label: "هدايا وكماليات" },
        { iconClass: "fas fa-ring", label: "مجوهرات وإكسسوارات" },
        { iconClass: "fas fa-car", label: "سيارات وقطع غيار" },
        { iconClass: "fas fa-plane", label: "سياحة وسفر" },
        { iconClass: "fas fa-hotel", label: "شقق وفنادق" },
        { iconClass: "fas fa-coffee", label: "مقهى / كوفي شوب" },
        { iconClass: "fas fa-ice-cream", label: "حلويات ومثلجات" },
        { iconClass: "fas fa-apple-alt", label: "خضار وفواكه" },
        { iconClass: "fas fa-book", label: "مكتبة ومستندات" },
        { iconClass: "fas fa-scissors", label: "صالون حلاقة / تجميل" },
        { iconClass: "fas fa-heartbeat", label: "صيدلية / رعاية صحية" },
        { iconClass: "fas fa-dumbbell", label: "نادي رياضي / جيم" },
        { iconClass: "fas fa-tools", label: "ورشة صيانة وتصليح" },
        { iconClass: "fas fa-warehouse", label: "مستودع / مخازن" },
        { iconClass: "fas fa-couch", label: "أثاث ومفروشات" }
    ];

    // دالة أمان لضمان أن البيانات المعادة هي مصفوفة دوماً (لتفادي مشاكل تحويل Firebase للمصفوفات إلى كائنات)
    function ensureArray(val) {
        if (!val) return [];
        if (Array.isArray(val)) return val;
        if (typeof val === 'object') {
            return Object.keys(val)
                .sort((a, b) => Number(a) - Number(b))
                .map(k => val[k])
                .filter(item => item !== null && item !== undefined);
        }
        return [];
    }

    function generateAccessCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function getRandomIcon() { return availableIconsList[Math.floor(Math.random() * availableIconsList.length)].iconClass; }
    function getArabicDayName(date) { const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"]; return days[date.getDay()]; }
    function formatDate(date) { const year = date.getFullYear(); const month = String(date.getMonth() + 1).padStart(2, '0'); const day = String(date.getDate()).padStart(2, '0'); return `${year}/${month}/${day}`; }
    function calculateTimeDifferenceInMinutes(checkinTime, checkoutTime) { const diffMinutes = (new Date(checkoutTime) - new Date(checkinTime)) / (1000 * 60); return Math.round(diffMinutes); }
    
    function formatMinutesToHoursAndMinutes(minutes) { 
        if (minutes <= 0) return '0 دقيقة'; 
        const hours = Math.floor(minutes / 60); 
        const mins = minutes % 60; 
        if (hours === 0) return mins + ' دقيقة'; 
        if (mins === 0) return hours + ' ساعة'; 
        return hours + ' ساعة و ' + mins + ' دقيقة'; 
    }
    
    async function calculateWorkHoursForEmployee(employeeName, branchName) {
        const employeeRecords = attendanceRecords.filter(r => r.employeeName === employeeName && r.branchName === branchName).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
        const dailyMinutes = {"الأحد":0,"الإثنين":0,"الثلاثاء":0,"الأربعاء":0,"الخميس":0,"الجمعة":0,"السبت":0};
        for (let i=0;i<employeeRecords.length-1;i++) { 
            if(employeeRecords[i].type==='دخول' && employeeRecords[i+1].type==='خروج'){
                const date=new Date(employeeRecords[i].timestamp); 
                const dayName=getArabicDayName(date); 
                const minutes=calculateTimeDifferenceInMinutes(employeeRecords[i].timestamp,employeeRecords[i+1].timestamp); 
                if(minutes>0 && minutes<1440) dailyMinutes[dayName]+=minutes; 
            } 
        }
        return dailyMinutes;
    }
    
    // تم إزالة استدعاء الحفظ التلقائي من هذه الدالة لمنع تكرار الحفظ اللانهائي (Infinite Loop)
    async function updateAllEmployeesWorkHours() { 
        for(let shop of shopsData) {
            if(shop) {
                shop.employees = ensureArray(shop.employees);
                for(let emp of shop.employees) {
                    if (emp) {
                        emp.workMinutes = await calculateWorkHoursForEmployee(emp.name, shop.name); 
                    }
                }
            }
        }
    }
    
    function getEmployeeAttendanceRecords(employeeName, branchName) { 
        return attendanceRecords.filter(r => r.employeeName === employeeName && r.branchName === branchName).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)); 
    }
    
    function groupAttendanceByDay(records) { 
        const grouped={}; 
        records.forEach(rec=>{ const dateKey=formatDate(new Date(rec.timestamp)); if(!grouped[dateKey]) grouped[dateKey]={date:dateKey,dateObj:new Date(rec.timestamp),dayName:getArabicDayName(new Date(rec.timestamp)),records:[]}; grouped[dateKey].records.push(rec); }); 
        return Object.values(grouped).sort((a,b)=>new Date(b.date)-new Date(a.date)); 
    }
    
    async function saveDataToFirebase() { if(window.firebaseDB) try{ await window.firebaseSet(window.firebaseRef(window.firebaseDB,'shopsData'), shopsData); }catch(e){} }
    async function loadDataFromFirebase() { if(window.firebaseDB) try{ const snap=await window.firebaseGet(window.firebaseRef(window.firebaseDB,'shopsData')); if(snap.exists()) return snap.val(); }catch(e){} return null; }
    async function loadAttendanceFromFirebase() { if(window.firebaseDB) try{ const snap=await window.firebaseGet(window.firebaseRef(window.firebaseDB,'attendanceRecords')); const records=[]; if(snap.exists()){ const data=snap.val(); for(const key in data) records.push({id:key,...data[key]}); } return records; }catch(e){} return []; }
    async function saveAttendanceToFirebase() { if(window.firebaseDB && attendanceRecords.length){ const recordsObj={}; attendanceRecords.forEach(r=>{if(r.id) recordsObj[r.id]=r;}); await window.firebaseSet(window.firebaseRef(window.firebaseDB,'attendanceRecords'), recordsObj);} }
    
    function getDefaultShopsData() { 
        return [{ id:1,name:"متجر الأندلس",icon:"fas fa-crown",desc:"أفخر التشكيلات",employees:[]},
                { id:2,name:"رواد الخليج",icon:"fas fa-ship",desc:"ريادة في البحر",employees:[]}]; 
    }
    
    function deleteShopById(shopId) { const shopIndex = shopsData.findIndex(s=>s && String(s.id)===String(shopId)); if(shopIndex!==-1){ shopsData.splice(shopIndex,1); saveDataToFirebase(); renderHomePage(); alert(`تم حذف المحل بنجاح`); } }
    function deleteEmployeeFromShop(shopId, employeeIndex) { const shop=shopsData.find(s=>s && String(s.id)===String(shopId)); if(shop && shop.employees && shop.employees[employeeIndex]){ shop.employees.splice(employeeIndex,1); saveDataToFirebase(); renderShopPage(shopId); alert(`تم حذف الموظف بنجاح`); } }

    function renderHomePage() {
        currentView='home'; if(!shopsData.length) return; const root=document.getElementById('appRoot');
        let shopOptions=''; 
        shopsData.forEach(shop=>{
            if (shop) {
                shopOptions+=`<option value="${shop.id}">${shop.name}</option>`;
            }
        });
        
        let shopsHtml=''; 
        shopsData.forEach(shop=>{ 
            if (shop) {
                const totalEmployees=shop.employees?.length||0; 
                const currentIcon = shop.icon || "fas fa-store";
                shopsHtml+=`
                <div class="shop-card" data-shop-id="${shop.id}">
                    <div class="shop-icon"><i class="${currentIcon}"></i></div>
                    <div class="shop-info">
                        <div class="shop-name">${shop.name}</div>
                        <div class="shop-desc"><i class="fas fa-users"></i> ${totalEmployees} موظف | ${shop.desc}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-icon edit-shop-btn" data-shop-id="${shop.id}"><i class="fas fa-pen"></i></button>
                        <button class="btn-icon btn-delete delete-shop-btn" data-shop-id="${shop.id}"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }
        });

        root.innerHTML = `
            <div class="main-header">
                <div class="header-brand">
                    <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
                    <div class="brand-text">
                        <h1>الشجاع جروب</h1>
                        <p>نظام الإدارة المتكامل</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-header-action" id="globalDeleteBranchBtn"><i class="fas fa-store-slash"></i></button>
                    <button class="btn-header-action" id="globalDeleteEmployeeBtn"><i class="fas fa-user-minus"></i></button>
                </div>
            </div>

            <div class="app-container">
                <div class="actions-bar">
                    <div class="action-card-btn" id="addBranchBtn">
                        <i class="fas fa-plus-circle"></i>
                        <span>إضافة فرع</span>
                    </div>
                    <div class="action-card-btn" id="showAddEmployeeBtn">
                        <i class="fas fa-user-plus"></i>
                        <span>إضافة موظف</span>
                    </div>
                </div>

                <div class="add-employee-form" id="addEmployeeForm">
                    <div class="form-title"><i class="fas fa-user-plus"></i> إضافة موظف جديد</div>
                    <div class="form-row">
                        <input type="text" id="newEmployeeName" class="form-input" placeholder="اسم الموظف">
                        <select id="newEmployeeShop" class="form-select">${shopOptions}</select>
                        <button id="confirmAddEmployeeBtn" class="btn-add">تأكيد الإضافة</button>
                    </div>
                </div>

                <div class="section-title"><i class="fas fa-layer-group"></i> الفروع المسجلة</div>
                <div class="shops-grid">${shopsHtml}</div>
            </div>
        `;

        document.getElementById('addBranchBtn').addEventListener('click',()=>{ showAddBranchModal(()=>renderHomePage()); });
        
        document.getElementById('showAddEmployeeBtn').addEventListener('click',()=>{ 
            const form = document.getElementById('addEmployeeForm');
            const select = document.getElementById('newEmployeeShop');
            let freshOptions = '';
            shopsData.forEach(shop => {
                if (shop) freshOptions += `<option value="${shop.id}">${shop.name}</option>`;
            });
            if(select) select.innerHTML = freshOptions;
            form.classList.toggle('active'); 
        });
        
        document.getElementById('confirmAddEmployeeBtn').addEventListener('click',async()=>{ 
            const nameInput=document.getElementById('newEmployeeName'); 
            const shopSelect=document.getElementById('newEmployeeShop'); 
            const employeeName=nameInput.value.trim(); 
            const shopId=parseInt(shopSelect.value); 
            
            if(!employeeName) return alert('الرجاء إدخال الاسم'); 
            if(isNaN(shopId)) return alert('الرجاء تحديد فرع صحيح أولاً');

            // مقارنة آمنة مع تحويل المعرفات إلى نصوص
            const shop=shopsData.find(s=>s && String(s.id)===String(shopId)); 
            if(shop){ 
                shop.employees = ensureArray(shop.employees);
                const emptyMinutes={"الأحد":0,"الإثنين":0,"الثلاثاء":0,"الأربعاء":0,"الخميس":0,"الجمعة":0,"السبت":0}; 
                const newPin = generateAccessCode(); 
                shop.employees.push({name:employeeName,accessCode:newPin,workMinutes:{...emptyMinutes}}); 
                
                await saveDataToFirebase(); 
                nameInput.value=''; 
                document.getElementById('addEmployeeForm').classList.remove('active'); 
                renderHomePage(); 
                alert(`تم إضافة الموظف بنجاح\nالرقم السري: ${newPin}`); 
            } else {
                alert('الفرع المحدد غير موجود');
            }
        });

        setupCardListeners();
    }

    function setupCardListeners() {
        document.querySelectorAll('.shop-card').forEach(card=>{ 
            card.addEventListener('click',(e)=>{ 
                if(!e.target.closest('.btn-icon')){
                    currentShopId=parseInt(card.getAttribute('data-shop-id')); 
                    renderShopPage(currentShopId); 
                } 
            }); 
        });
        document.querySelectorAll('.edit-shop-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const shopId=parseInt(btn.getAttribute('data-shop-id')); const shop=shopsData.find(s=>s && String(s.id)===String(shopId)); if(shop) showEditShopModal(shop,()=>renderHomePage()); }); });
        document.querySelectorAll('.delete-shop-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const shopId=parseInt(btn.getAttribute('data-shop-id')); if(confirm('حذف المحل؟')) deleteShopById(shopId); }); });
        
        document.getElementById('globalDeleteEmployeeBtn').onclick = () => { alert('اختر موظفاً من قائمة الفروع لحذفه'); };
        document.getElementById('globalDeleteBranchBtn').onclick = () => { alert('اختر فرعاً من القائمة لحذفه'); };
    }

    function renderShopPage(shopId) { 
        currentView='shop'; currentShopId=shopId; const shop=shopsData.find(s=>s && String(s.id)===String(shopId)); if(!shop) return; 
        let employeesHtml=''; 
        shop.employees = ensureArray(shop.employees);
        if(shop.employees && shop.employees.length > 0) {
            shop.employees.forEach((emp,idx)=>{ 
                if (emp) {
                    const totalMinutes=Object.values(emp.workMinutes||{}).reduce((a,b)=>a+b,0); 
                    const displayCode = (emp.accessCode && emp.accessCode.startsWith('hashed_')) ? 'مشفر: ' + emp.accessCode.substring(7, 13) : (emp.accessCode || '');
                    employeesHtml+=`
                    <div class="employee-card" data-emp-index="${idx}" data-shop-id="${shop.id}">
                        <div class="employee-avatar"><i class="fas fa-user-tie"></i></div>
                        <div class="employee-details">
                            <div class="employee-name">${emp.name}</div>
                            <div class="employee-hours"><i class="fas fa-clock"></i> ${formatMinutesToHoursAndMinutes(totalMinutes)}</div>
                            <div class="badge-pin" title="${emp.accessCode}"><i class="fas fa-key"></i> ${displayCode}</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-icon edit-employee-btn" data-emp-index="${idx}"><i class="fas fa-pen"></i></button>
                            <button class="btn-icon btn-delete delete-employee-btn" data-emp-index="${idx}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`; 
                }
            });
        } else {
            employeesHtml = '<div style="text-align:center; padding:40px; color:#64748b;">لا يوجد موظفين في هذا الفرع</div>';
        }

        document.getElementById('appRoot').innerHTML = `
            <div class="main-header">
                <div class="header-brand">
                    <button class="btn-icon" id="globalBackBtn" style="margin-left:10px;"><i class="fas fa-arrow-right"></i></button>
                    <div class="brand-text">
                        <h1>${shop.name}</h1>
                        <p>قائمة الموظفين والنشاط</p>
                    </div>
                </div>
            </div>
            <div class="app-container">
                <div class="section-title"><i class="fas fa-users-viewfinder"></i> موظفي الفرع</div>
                <div class="employees-grid">${employeesHtml}</div>
            </div>
        `; 
        
        document.getElementById('globalBackBtn').addEventListener('click',()=>renderHomePage());
        document.querySelectorAll('.employee-card').forEach(card=>{ card.addEventListener('click',(e)=>{ if(!e.target.closest('.btn-icon')){ const empIdx=parseInt(card.getAttribute('data-emp-index')); renderEmployeePage(shop.employees[empIdx],shopId,empIdx); } }); });
        document.querySelectorAll('.edit-employee-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const empIdx=parseInt(btn.getAttribute('data-emp-index')); showEditEmployeeModal(shop.employees[empIdx],shopId,()=>renderShopPage(shopId)); }); });
        document.querySelectorAll('.delete-employee-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const empIdx=parseInt(btn.getAttribute('data-emp-index')); if(confirm('حذف الموظف؟')) deleteEmployeeFromShop(shopId,empIdx); }); });
    }

    function renderEmployeePage(employee, returnShopId, employeeIndex) { 
        currentView='employee'; currentEmployeeData=employee; currentEmployeeShopId=returnShopId; currentEmployeeIndex=employeeIndex; 
        const totalMinutes=Object.values(employee.workMinutes||{}).reduce((a,b)=>a+b,0); const shop=shopsData.find(s=>s && String(s.id)===String(returnShopId)); 
        const records=getEmployeeAttendanceRecords(employee.name,shop?.name||''); const grouped=groupAttendanceByDay(records); 
        
        const displayCodeProfile = (employee.accessCode && employee.accessCode.startsWith('hashed_')) ? 'مشفر: ' + employee.accessCode.substring(7, 15) : (employee.accessCode || '');

        let daysHtml=''; 
        grouped.forEach(day=>{ 
            let rows=''; 
            const checkins=day.records.filter(r=>r.type==='دخول'); 
            const checkouts=day.records.filter(r=>r.type==='خروج'); 
            for(let i=0;i<Math.max(checkins.length,checkouts.length);i++){ 
                const ci=checkins[i]; const co=checkouts[i]; 
                let duration='—'; 
                if(ci&&co) duration=formatMinutesToHoursAndMinutes(calculateTimeDifferenceInMinutes(ci.timestamp,co.timestamp)); 
                rows+=`<tr>
                    <td class="time-in">${ci?new Date(ci.timestamp).toLocaleTimeString('ar-EG'):'—'}</td>
                    <td class="time-out">${co?new Date(co.timestamp).toLocaleTimeString('ar-EG'):'—'}</td>
                    <td style="color:var(--primary)">${duration}</td>
                </tr>`; 
            } 
            daysHtml+=`
            <div class="day-attendance-card">
                <div class="day-header">
                    <span class="day-name">${day.dayName}</span>
                    <span class="day-date">${day.date}</span>
                </div>
                <div class="table-responsive">
                    <table class="custom-table">
                        <thead><tr><th>دخول</th><th>خروج</th><th>المدة</th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="3">لا سجلات</td></tr>'}</tbody>
                    </table>
                </div>
            </div>`; 
        });

        const deleteRecordsBtnHtml = records.length > 0 
            ? `<button id="clearEmployeeRecordsBtn" class="btn-header-action" style="background: rgba(247, 37, 133, 0.1); color: var(--danger); border: 1px solid rgba(247, 37, 133, 0.2);"><i class="fas fa-trash-can"></i> حذف السجلات</button>` 
            : '';

        document.getElementById('appRoot').innerHTML = `
            <div class="main-header">
                <button class="btn-icon" id="globalBackBtn"><i class="fas fa-arrow-right"></i></button>
                <div class="brand-text" style="text-align:center; flex:1">
                    <h1>ملف الموظف</h1>
                </div>
                <div style="width:32px"></div>
            </div>
            <div class="app-container">
                <div class="profile-header">
                    <div class="profile-avatar-large"><i class="fas fa-user"></i></div>
                    <h2>${employee.name}</h2>
                    <p style="opacity:0.8; font-size:0.9rem">كود الدخول: ${displayCodeProfile}</p>
                    <div class="total-hours-pill">
                        إجمالي العمل: ${formatMinutesToHoursAndMinutes(totalMinutes)}
                    </div>
                </div>
                <div class="section-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span><i class="fas fa-calendar-check"></i> سجل الحضور</span>
                    ${deleteRecordsBtnHtml}
                </div>
                ${daysHtml || '<div style="text-align:center; padding:20px; color:var(--text-muted)">لا يوجد سجلات حضور</div>'}
            </div>
        `;

        document.getElementById('globalBackBtn').addEventListener('click',()=>renderShopPage(returnShopId));

        const clearBtn = document.getElementById('clearEmployeeRecordsBtn');
        if (clearBtn) {
            clearBtn.addEventListener('click', async () => {
                if (confirm(`هل أنت متأكد من حذف جميع سجلات الحضور الخاصة بالموظف (${employee.name}) في فرع (${shop?.name || ''}) نهائياً؟`)) {
                    attendanceRecords = attendanceRecords.filter(r => !(r.employeeName === employee.name && r.branchName === (shop?.name || '')));
                    await saveAttendanceToFirebase();
                    await updateAllEmployeesWorkHours();
                    renderEmployeePage(employee, returnShopId, employeeIndex);
                    alert('تم حذف جميع السجلات بنجاح');
                }
            });
        }
    }

    function showEditShopModal(shop,callback){
        const modal=document.createElement('div'); modal.className='modal-overlay';
        
        let iconOptionsHtml = '';
        availableIconsList.forEach(item => {
            const isSelected = shop.icon === item.iconClass ? 'selected' : '';
            iconOptionsHtml += `<option value="${item.iconClass}" ${isSelected}>${item.label}</option>`;
        });

        modal.innerHTML=`<div class="modal-content">
            <h3 style="margin-bottom:15px">تعديل بيانات الفرع</h3>
            
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">اسم الفرع</label>
                <input id="editShopName" class="form-input" value="${shop.name}">
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">أيقونة / نوع الفرع</label>
                <select id="editShopIcon" class="form-select">
                    ${iconOptionsHtml}
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn-add modal-save">حفظ</button>
                <button class="btn-header-action modal-cancel">إلغاء</button>
            </div>
        </div>`;
        document.body.appendChild(modal);
        modal.querySelector('.modal-save').onclick = async() => {
            const newName = modal.querySelector('#editShopName').value.trim();
            const newIcon = modal.querySelector('#editShopIcon').value;
            if(newName) {
                shop.name = newName;
                shop.icon = newIcon;
                await saveDataToFirebase();
                callback();
                modal.remove();
            }
        };
        modal.querySelector('.modal-cancel').onclick = () => modal.remove();
    }

    function showAddBranchModal(callback){
        const modal=document.createElement('div'); modal.className='modal-overlay';
        
        let iconOptionsHtml = '';
        availableIconsList.forEach(item => {
            iconOptionsHtml += `<option value="${item.iconClass}">${item.label}</option>`;
        });

        modal.innerHTML=`<div class="modal-content">
            <h3 style="margin-bottom:15px">إضافة فرع جديد</h3>
            
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">اسم الفرع الجديد</label>
                <input id="newBranchName" class="form-input" placeholder="مثال: فرع الملز">
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">وصف الفرع</label>
                <input id="newBranchDesc" class="form-input" placeholder="مثال: مبيعات التجزئة">
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">نوع النشاط (الأيقونة)</label>
                <select id="newBranchIcon" class="form-select">
                    ${iconOptionsHtml}
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn-add modal-save">إضافة</button>
                <button class="btn-header-action modal-cancel">إلغاء</button>
            </div>
        </div>`;
        document.body.appendChild(modal);
        modal.querySelector('.modal-save').onclick = async() => {
            const name = modal.querySelector('#newBranchName').value.trim();
            const desc = modal.querySelector('#newBranchDesc').value.trim() || "فرع جديد";
            const icon = modal.querySelector('#newBranchIcon').value;
            if(name) {
                const newId=Math.max(...shopsData.map(s=>s && s.id ? parseInt(s.id) : 0),0)+1; 
                shopsData.push({id:newId,name:name,icon:icon,desc:desc,employees:[]}); 
                await saveDataToFirebase(); 
                callback();
                modal.remove();
            } else {
                alert('الرجاء إدخال اسم الفرع');
            }
        };
        modal.querySelector('.modal-cancel').onclick = () => modal.remove();
    }

    function showEditEmployeeModal(employee,shopId,callback){
        const modal=document.createElement('div'); modal.className='modal-overlay';
        const currentCode = employee.accessCode || '';
        modal.innerHTML=`<div class="modal-content">
            <h3 style="margin-bottom:15px">تعديل بيانات الموظف</h3>
            
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">اسم الموظف</label>
                <input id="editEmployeeName" class="form-input" value="${employee.name}">
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">كلمة المرور / كود الدخول</label>
                <input id="editEmployeeAccessCode" class="form-input" value="${currentCode}" placeholder="أدخل كلمة المرور الجديدة">
            </div>

            <div class="modal-buttons">
                <button class="btn-add modal-save">حفظ</button>
                <button class="btn-header-action modal-cancel">إلغاء</button>
            </div>
        </div>`;
        document.body.appendChild(modal);
        modal.querySelector('.modal-save').onclick = async() => {
            const newName = modal.querySelector('#editEmployeeName').value.trim();
            const newCode = modal.querySelector('#editEmployeeAccessCode').value.trim();
            if(newName && newCode) {
                const oldName = employee.name;
                employee.name = newName;
                employee.accessCode = newCode;
                attendanceRecords.forEach(r => {
                    if(r.employeeName === oldName) r.employeeName = newName;
                });
                await saveDataToFirebase();
                await saveAttendanceToFirebase();
                callback();
                modal.remove();
            } else {
                alert('الرجاء التأكد من تعبئة حقل الاسم وكلمة المرور');
            }
        };
        modal.querySelector('.modal-cancel').onclick = () => modal.remove();
    }

    function listenToFirebaseChanges(){ 
        if(window.firebaseDB){ 
            window.firebaseOnValue(window.firebaseRef(window.firebaseDB,'shopsData'),async(snap)=>{ 
                if(snap.exists()) {
                    const val = snap.val();
                    shopsData = ensureArray(val);
                    shopsData.forEach(shop => {
                        if (shop) shop.employees = ensureArray(shop.employees);
                    });
                } 
                await updateAllEmployeesWorkHours(); 
                refreshView();
            }); 
            window.firebaseOnValue(window.firebaseRef(window.firebaseDB,'attendanceRecords'),async(snap)=>{ 
                const records=[]; if(snap.exists()){ const data=snap.val(); for(const key in data) records.push({id:key,...data[key]}); } 
                attendanceRecords=records; 
                await updateAllEmployeesWorkHours(); 
                refreshView();
            }); 
        } 
    }

    function refreshView() {
        if(currentView==='home') renderHomePage(); 
        else if(currentView==='shop') renderShopPage(currentShopId); 
        else if(currentView==='employee') renderEmployeePage(currentEmployeeData,currentEmployeeShopId,currentEmployeeIndex);
    }
    
    let appStarted=false; 
    const startApplication=async()=>{ 
        if(appStarted) return; appStarted=true; 
        
        const rawShops=await loadDataFromFirebase(); 
        const savedShops=ensureArray(rawShops);
        savedShops.forEach(shop => {
            if (shop) shop.employees = ensureArray(shop.employees);
        });

        const savedAttendance=await loadAttendanceFromFirebase(); 
        attendanceRecords=savedAttendance; 

        if(savedShops && savedShops.length > 0){ 
            shopsData=savedShops;
        } else { 
            shopsData=getDefaultShopsData(); 
            await saveDataToFirebase(); 
        } 
        await updateAllEmployeesWorkHours(); 
        listenToFirebaseChanges(); 
        renderHomePage(); 
    };

    window.addEventListener('firebaseReady',startApplication); 
    setTimeout(()=>{ if(!appStarted) startApplication(); },3000);
</script>
</body>
</html>
