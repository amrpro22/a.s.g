<div id="appRoot" class="app-container">

<script>
    // بيانات المحلات الأساسية
    let shopsData = [];
    
    // دوال مساعدة
    function timeToMinutes(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        return hours * 60 + minutes;
    }
    
    function getMinutesDifference(start, end) {
        let startMin = timeToMinutes(start);
        let endMin = timeToMinutes(end);
        let diff = endMin - startMin;
        if (diff < 0) diff += 24 * 60;
        return diff;
    }
    
    function minutesToHoursMinutes(minutes) {
        const hrs = Math.floor(minutes / 60);
        const mins = minutes % 60;
        if (mins === 0) return `${hrs} ساعات`;
        if (hrs === 0) return `${mins} دقيقة`;
        return `${hrs} ساعة و ${mins} دقيقة`;
    }
    
    function getDailyWorkHoursText(entryBase, exitBase) {
        const minutes = getMinutesDifference(entryBase, exitBase);
        return minutesToHoursMinutes(minutes);
    }
    
    function addMinutesToTime(timeBase, minutesAdd) {
        let [hours, minutes] = timeBase.split(':').map(Number);
        let total = hours * 60 + minutes + minutesAdd;
        let newHours = Math.floor(total / 60) % 24;
        let newMins = total % 60;
        let raw = `${String(newHours).padStart(2, '0')}:${String(newMins).padStart(2, '0')}`;
        let period = newHours >= 12 ? 'مساءً' : 'صباحاً';
        let displayHour = newHours % 12;
        if (displayHour === 0) displayHour = 12;
        let formatted = `${displayHour}:${String(newMins).padStart(2, '0')} ${period}`;
        return { raw, formatted };
    }
    
    function generateWeeklySchedule(entryBase, exitBase) {
        const weekDays = [
            { ar: "الإثنين", icon: "fas fa-sun" },
            { ar: "الثلاثاء", icon: "fas fa-cloud-sun" },
            { ar: "الأربعاء", icon: "fas fa-cloud" },
            { ar: "الخميس", icon: "fas fa-star" },
            { ar: "الجمعة", icon: "fas fa-moon" },
            { ar: "السبت", icon: "fas fa-calendar-week" },
            { ar: "الأحد", icon: "fas fa-calendar-day" }
        ];
        const today = new Date();
        const currentDay = today.getDay();
        let startOfWeek = new Date(today);
        let diff = currentDay === 0 ? -6 : 1 - currentDay;
        startOfWeek.setDate(today.getDate() + diff);
        
        const schedule = [];
        for (let i = 0; i < weekDays.length; i++) {
            let date = new Date(startOfWeek);
            date.setDate(startOfWeek.getDate() + i);
            let year = date.getFullYear();
            let month = String(date.getMonth() + 1).padStart(2, '0');
            let day = String(date.getDate()).padStart(2, '0');
            let dateStr = `${year}/${month}/${day}`;
            let variance = (i * 2) % 12;
            let entryData = addMinutesToTime(entryBase, variance);
            let exitData = addMinutesToTime(exitBase, variance + 3);
            schedule.push({
                dayName: weekDays[i].ar,
                dayIcon: weekDays[i].icon,
                date: dateStr,
                entryTime: entryData.formatted,
                exitTime: exitData.formatted,
                entryRaw: entryData.raw,
                exitRaw: exitData.raw
            });
        }
        return schedule;
    }
    
    function generateAccessCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    async function saveDataToFirebase() {
        if (!window.firebaseDB) return;
        try {
            const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
            await window.firebaseSet(dbRef, shopsData);
        } catch (error) {
            console.warn("تعذر الحفظ في Firebase (الرجاء التأكد من صلاحيات Database Rules):", error.message);
        }
    }
    
    async function loadDataFromFirebase() {
        if (!window.firebaseDB) return null;
        try {
            const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
            const snapshot = await window.firebaseGet(dbRef);
            if (snapshot.exists()) return snapshot.val();
            return null;
        } catch (error) {
            console.warn("تعذر جلب البيانات من Firebase، سيتم استخدام البيانات الافتراضية:", error.message);
            return null;
        }
    }

    // عرض نافذة تعديل اسم المحل
    function showEditShopModal(shop, callback) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="edit-modal">
                <h3><i class="fas fa-edit"></i> تعديل اسم المحل</h3>
                <input type="text" id="editShopName" value="${shop.name.replace(/"/g, '&quot;')}" placeholder="أدخل الاسم الجديد">
                <div class="modal-buttons">
                    <button class="modal-save"><i class="fas fa-check"></i> حفظ</button>
                    <button class="modal-cancel"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#editShopName');
        input.focus();
        
        modal.querySelector('.modal-save').addEventListener('click', async () => {
            const newName = input.value.trim();
            if (newName && newName !== shop.name) {
                shop.name = newName;
                await saveDataToFirebase();
                if (callback) callback();
            }
            modal.remove();
        });
        
        modal.querySelector('.modal-cancel').addEventListener('click', () => {
            modal.remove();
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
    }
    
    // دوال العرض مع زر رجوع موحد
    function renderHomePage() {
        if (!shopsData.length) return;
        const root = document.getElementById('appRoot');
        let shopOptions = '';
        shopsData.forEach(shop => { shopOptions += `<option value="${shop.id}">${shop.name}</option>`; });
        let shopsHtml = '';
        shopsData.forEach(shop => {
            shopsHtml += `<div class="shop-card" data-shop-id="${shop.id}">
                <div class="shop-icon"><i class="${shop.icon}"></i></div>
                <div class="shop-info">
                    <div class="shop-name-wrapper">
                        <div class="shop-name">${shop.name}</div>
                        <button class="edit-shop-btn" data-shop-id="${shop.id}" onclick="event.stopPropagation()"><i class="fas fa-pen"></i> تعديل</button>
                    </div>
                    <div class="shop-desc"><i class="fas fa-users" style="font-size:0.8rem; margin-left:3px;"></i> عدد الموظفين: ${shop.employees.length} | ${shop.desc}</div>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </div>`;
        });
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-name">الشجاع جروب</div>
                <div class="subhead">لوحة التحكم الشاملة لإدارة الفروع</div>
                <div class="dashboard-badge"><i class="fas fa-wifi"></i> متصل بـ Firebase بشكل حي</div>
                <div class="back-button hidden" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="add-employee-form">
                <div class="form-title"><i class="fas fa-user-plus"></i><span>إضافة موظف جديد وتوليد رمز تلقائي</span></div>
                <div class="form-row">
                    <input type="text" id="newEmployeeName" class="form-input" placeholder="اكتب اسم الموظف هنا...">
                    <select id="newEmployeeShop" class="form-select">${shopOptions}</select>
                    <button id="addEmployeeBtn" class="btn-add"><i class="fas fa-plus-circle"></i> إضافة الآن</button>
                </div>
            </div>
            
            <div class="section-title"><i class="fas fa-building text-primary"></i> المتاجر والفروع</div>
            ${shopsHtml}
            <footer><i class="fas fa-shield-alt"></i> جميع البيانات مشفرة ومحفوظة بأمان في قاعدة بيانات سحابية</footer>
        `;
        root.innerHTML = html;
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.add('hidden');
        
        document.getElementById('addEmployeeBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('newEmployeeName');
            const shopSelect = document.getElementById('newEmployeeShop');
            const employeeName = nameInput.value.trim();
            const shopId = parseInt(shopSelect.value);
            if (!employeeName) { alert('الرجاء إدخال اسم الموظف أولاً'); return; }
            const shop = shopsData.find(s => s.id === shopId);
            if (shop) {
                const newAccessCode = generateAccessCode();
                shop.employees.push({ 
                    name: employeeName, 
                    entryBase: "09:00", 
                    exitBase: "17:00", 
                    entryLabel: "09:00 صباحاً", 
                    exitLabel: "05:00 مساءً",
                    accessCode: newAccessCode
                });
                await saveDataToFirebase();
                renderHomePage();
                alert(`تم بنجاح إضافة الموظف: ${employeeName}\n\nرمز الدخول السري: ${newAccessCode}\n\nيرجى تسليم هذا الرمز للموظف.`);
            }
        });
        
        // إضافة مستمعي الأحداث لبطاقات المحلات وأزرار التعديل
        document.querySelectorAll('.shop-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.edit-shop-btn')) {
                    renderShopPage(parseInt(card.getAttribute('data-shop-id')));
                }
            });
        });
        
        document.querySelectorAll('.edit-shop-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const shopId = parseInt(btn.getAttribute('data-shop-id'));
                const shop = shopsData.find(s => s.id === shopId);
                if (shop) {
                    showEditShopModal(shop, () => {
                        renderHomePage();
                    });
                }
            });
        });
    }
    
    function renderShopPage(shopId) {
        const shop = shopsData.find(s => s.id === shopId);
        if (!shop) return;
        let employeesHtml = '';
        shop.employees.forEach((emp, idx) => {
            const codeDisplay = emp.accessCode 
                ? `<div class="employee-pin"><i class="fas fa-key"></i> رمز الدخول: ${emp.accessCode}</div>` 
                : `<div class="employee-pin" style="color:#ef4444; background: rgba(239, 68, 68, 0.1); border-color: #ef4444;"><i class="fas fa-exclamation-circle"></i> رمز: غير محدد</div>`;
            
            employeesHtml += `
            <div class="employee-card" data-emp-index="${idx}" data-shop-id="${shop.id}">
                <div class="employee-avatar"><i class="fas fa-user-tie"></i></div>
                <div class="employee-details">
                    <div class="employee-name">${emp.name}</div>
                    <div class="employee-schedule">
                        <span><i class="fas fa-sign-in-alt text-success"></i> ${emp.entryLabel}</span>
                        <span><i class="fas fa-sign-out-alt text-danger"></i> ${emp.exitLabel}</span>
                    </div>
                    ${codeDisplay}
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </div>`;
        });
        
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-name" style="font-size: 1.8rem;">${shop.name}</div>
                <div class="subhead">إدارة طاقم العمل والرموز السرية</div>
                <div class="back-button" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="shop-header">
                <div class="shop-title"><i class="${shop.icon}"></i> ${shop.name}</div>
                <div style="color:var(--primary); font-weight:700;"><i class="fas fa-users"></i> ${shop.employees.length} موظف</div>
            </div>
            
            <div class="section-title"><i class="fas fa-id-card-clip"></i> قائمة الموظفين المسجلين</div>
            ${employeesHtml}
            
            <footer>تطبيق إدارة الموظفين | ${shop.name}</footer>
        `;
        document.getElementById('appRoot').innerHTML = html;
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.remove('hidden');
        backBtn.addEventListener('click', () => renderHomePage());
        
        document.querySelectorAll('.employee-card').forEach(card => {
            card.addEventListener('click', () => {
                const empIndex = parseInt(card.getAttribute('data-emp-index'));
                const sId = parseInt(card.getAttribute('data-shop-id'));
                const targetShop = shopsData.find(s => s.id === sId);
                if (targetShop && targetShop.employees[empIndex]) renderEmployeePage(targetShop.employees[empIndex], sId, empIndex);
            });
        });
    }
    
    // الدالة المصححة التي تحفظ البيانات في Firebase بشكل صحيح
    async function renderEmployeePage(employee, returnShopId, employeeIndex) {
        const weeklyData = generateWeeklySchedule(employee.entryBase, employee.exitBase);
        const totalWeeklyMinutes = weeklyData.reduce((sum, day) => sum + getMinutesDifference(day.entryRaw, day.exitRaw), 0);
        const totalWeeklyText = minutesToHoursMinutes(totalWeeklyMinutes);
        
        let rowsHtml = '';
        for (const day of weeklyData) {
            rowsHtml += `
            <div class="week-row">
                <div class="day-cell"><i class="${day.dayIcon}"></i> ${day.dayName}</div>
                <div class="date-cell">${day.date}</div>
                <div class="entry-cell">${day.entryTime}</div>
                <div class="exit-cell">${day.exitTime}</div>
            </div>`;
        }
        
        const accessCodeHtml = employee.accessCode 
            ? `<div style="background: rgba(67, 97, 238, 0.08); border: 2px solid var(--primary); border-radius: 50px; padding: 12px 24px; margin-top: 15px; display:inline-block; direction:ltr; font-size:1.1rem; color:var(--primary-dark);">
                <i class="fas fa-lock"></i> <strong>رمز الدخول:</strong> <span style="letter-spacing: 2px;">${employee.accessCode}</span>
               </div>` 
            : `<div style="background: rgba(239, 68, 68, 0.1); border: 2px dashed #ef4444; border-radius: 50px; padding: 12px 24px; margin-top: 15px; display:inline-block; color:#ef4444; font-weight:700;">
                <i class="fas fa-exclamation-triangle"></i> لا يوجد رمز دخول
               </div>`;
               
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-name" style="font-size: 1.6rem;">الملف الشخصي</div>
                <div class="subhead">سجل الحضور والرموز الخاصة</div>
                <div class="back-button" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="employee-profile">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <div class="profile-name">${employee.name}</div>
                ${accessCodeHtml}
                <br>
                <div class="work-hours-card">
                    <div class="daily-hours"><i class="fas fa-stopwatch"></i> معدل ساعات العمل اليومية: ${getDailyWorkHoursText(employee.entryBase, employee.exitBase)}</div>
                </div>
                <button class="delete-record-btn" id="deleteScheduleBtn">
                    <i class="fas fa-undo-alt"></i> إعادة تعيين جدول الدوام للوضع الافتراضي
                </button>
            </div>
            
            <div class="weekly-card">
                <div class="weekly-header"><i class="fas fa-calendar-check text-primary"></i><span>سجل الدوام الأسبوعي</span></div>
                <div class="table-header-row">
                    <div class="col-day">اليوم</div>
                    <div class="col-date">التاريخ</div>
                    <div class="col-entry">دخول</div>
                    <div class="col-exit">مغادرة</div>
                </div>
                ${rowsHtml}
                <div class="total-week-row">
                    <i class="fas fa-calculator"></i> إجمالي ساعات العمل الأسبوعية: <span>${totalWeeklyText}</span>
                </div>
            </div>
            
            <footer>بيانات الموظف: ${employee.name} | النظام الآمن</footer>
        `;
        document.getElementById('appRoot').innerHTML = html;
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.remove('hidden');
        backBtn.addEventListener('click', () => renderShopPage(returnShopId));
        
        // زر إعادة التعيين - يقوم بحفظ البيانات في Firebase ثم إعادة تحميل الصفحة
        document.getElementById('deleteScheduleBtn').addEventListener('click', async () => {
            if (confirm(`هل أنت متأكد من إعادة ضبط دوام الموظف "${employee.name}" إلى القيم الافتراضية (9 صباحاً - 5 مساءً)؟`)) {
                // تحديث بيانات الموظف
                employee.entryBase = "09:00";
                employee.exitBase = "17:00";
                employee.entryLabel = "09:00 صباحاً";
                employee.exitLabel = "05:00 مساءً";
                
                // حفظ التغييرات في Firebase
                await saveDataToFirebase();
                
                // إعادة عرض الصفحة مع البيانات الجديدة
                renderEmployeePage(employee, returnShopId, employeeIndex);
            }
        });
    }
    
    // بدء التطبيق مع Firebase وحماية ضد التعليق
    let appStarted = false;

    const startApplication = async () => {
        if (appStarted) return;
        appStarted = true;

        try {
            const savedData = await loadDataFromFirebase();
            if (savedData && savedData.length) {
                shopsData = savedData;
                let updated = false;
                for (let shop of shopsData) {
                    if (shop.employees) {
                        for (let emp of shop.employees) {
                            if (!emp.accessCode) {
                                emp.accessCode = generateAccessCode();
                                updated = true;
                            }
                        }
                    }
                }
                if(updated) await saveDataToFirebase();
            } else {
                shopsData = getDefaultShopsData();
                await saveDataToFirebase();
            }
        } catch (error) {
            console.error("حدث خطأ غير متوقع، تم التبديل للبيانات المحلية:", error);
            shopsData = getDefaultShopsData();
        } finally {
            // إجبار الواجهة على الظهور دائماً حتى لو فشل الاتصال بقاعدة البيانات
            renderHomePage();
        }
    };

    window.addEventListener('firebaseReady', startApplication);

    // مؤقت احتياطي (Fallback): إذا لم يستجب Firebase خلال 3 ثوانٍ، افتح النظام محلياً لكي لا يبقى معلقاً
    setTimeout(() => {
        if (!appStarted) {
            console.warn("تأخر استجابة Firebase، سيتم فتح الواجهة للعمل محلياً...");
            startApplication();
        }
    }, 3000);
</script>
