<script>
    // بيانات المحلات الأساسية (سيتم تحميل الموظفين من Firebase)
    let shopsData = [];
    
    // الدوال المساعدة
    function timeToMinutes(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        return hours * 60 + minutes;
    }
    
    function getMinutesDifference(start, end) {
        let startMin = timeToMinutes(start);
        let endMin = timeToMinutes(end);
        let diff = endMin - startMin;
        if (diff < 0) diff += 24 * 60;
        return diff;
    }
    
    function minutesToHoursMinutes(minutes) {
        const hrs = Math.floor(minutes / 60);
        const mins = minutes % 60;
        if (mins === 0) return `${hrs} ساعات`;
        if (hrs === 0) return `${mins} دقيقة`;
        return `${hrs} ساعة و ${mins} دقيقة`;
    }
    
    function getDailyWorkHoursText(entryBase, exitBase) {
        const minutes = getMinutesDifference(entryBase, exitBase);
        return minutesToHoursMinutes(minutes);
    }
    
    function addMinutesToTime(timeBase, minutesAdd) {
        let [hours, minutes] = timeBase.split(':').map(Number);
        let total = hours * 60 + minutes + minutesAdd;
        let newHours = Math.floor(total / 60) % 24;
        let newMins = total % 60;
        let raw = `${String(newHours).padStart(2, '0')}:${String(newMins).padStart(2, '0')}`;
        let period = newHours >= 12 ? 'مساءً' : 'صباحاً';
        let displayHour = newHours % 12;
        if (displayHour === 0) displayHour = 12;
        let formatted = `${displayHour}:${String(newMins).padStart(2, '0')} ${period}`;
        return { raw, formatted };
    }
    
    function generateWeeklySchedule(entryBase, exitBase) {
        const weekDays = [
            { ar: "الإثنين", icon: "fas fa-sun" },
            { ar: "الثلاثاء", icon: "fas fa-cloud-sun" },
            { ar: "الأربعاء", icon: "fas fa-cloud" },
            { ar: "الخميس", icon: "fas fa-star" },
            { ar: "الجمعة", icon: "fas fa-moon" },
            { ar: "السبت", icon: "fas fa-calendar-week" },
            { ar: "الأحد", icon: "fas fa-calendar-day" }
        ];
        const today = new Date();
        const currentDay = today.getDay();
        let startOfWeek = new Date(today);
        let diff = currentDay === 0 ? -6 : 1 - currentDay;
        startOfWeek.setDate(today.getDate() + diff);
        
        const schedule = [];
        for (let i = 0; i < weekDays.length; i++) {
            let date = new Date(startOfWeek);
            date.setDate(startOfWeek.getDate() + i);
            let year = date.getFullYear();
            let month = String(date.getMonth() + 1).padStart(2, '0');
            let day = String(date.getDate()).padStart(2, '0');
            let dateStr = `${year}/${month}/${day}`;
            let variance = (i * 2) % 12;
            let entryData = addMinutesToTime(entryBase, variance);
            let exitData = addMinutesToTime(exitBase, variance + 3);
            schedule.push({
                dayName: weekDays[i].ar,
                dayIcon: weekDays[i].icon,
                date: dateStr,
                entryTime: entryData.formatted,
                exitTime: exitData.formatted,
                entryRaw: entryData.raw,
                exitRaw: exitData.raw
            });
        }
        return schedule;
    }
    
    // حفظ البيانات إلى Firebase
    async function saveDataToFirebase() {
        if (!window.firebaseDB) return;
        const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
        await window.firebaseSet(dbRef, shopsData);
    }
    
    // تحميل البيانات من Firebase
    async function loadDataFromFirebase() {
        if (!window.firebaseDB) return null;
        const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
        const snapshot = await window.firebaseGet(dbRef);
        if (snapshot.exists()) {
            return snapshot.val();
        }
        return null;
    }

    // دوال العرض (مبسطة)
    function renderHomePage() {
        if (!shopsData.length) return;
        const root = document.getElementById('appRoot');
        let shopOptions = '';
        shopsData.forEach(shop => { shopOptions += `<option value="${shop.id}">${shop.name}</option>`; });
        let shopsHtml = '';
        shopsData.forEach(shop => {
            shopsHtml += `<div class="shop-card" data-shop-id="${shop.id}"><div class="shop-icon"><i class="${shop.icon}"></i></div><div class="shop-info"><div class="shop-name">${shop.name}</div><div class="shop-desc">${shop.desc} | ${shop.employees.length} موظف</div></div><i class="fas fa-chevron-left" style="color: #c6c6c8;"></i></div>`;
        });
        const html = `<div class="main-header"><div class="brand-name">الشجاع جروب</div><div class="subhead">لوحة التحكم الشاملة</div><div class="dashboard-badge"><i class="fas fa-chart-line"></i> متصل بـ Firebase</div></div>
            <div class="add-employee-form"><div class="form-title"><i class="fas fa-user-plus" style="color: #007aff;"></i><span>إضافة موظف جديد</span></div>
            <div class="form-row"><input type="text" id="newEmployeeName" class="form-input" placeholder="اسم الموظف"><select id="newEmployeeShop" class="form-select">${shopOptions}</select>
            <button id="addEmployeeBtn" class="btn-add"><i class="fas fa-plus"></i> إضافة</button></div></div>
            ${shopsHtml}<footer><i class="fas fa-apple"></i> البيانات محفوظة في Firebase | اضغط على متجر لعرض الموظفين</footer>`;
        root.innerHTML = html;
        document.getElementById('addEmployeeBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('newEmployeeName');
            const shopSelect = document.getElementById('newEmployeeShop');
            const employeeName = nameInput.value.trim();
            const shopId = parseInt(shopSelect.value);
            if (!employeeName) { alert('الرجاء إدخال اسم الموظف'); return; }
            const shop = shopsData.find(s => s.id === shopId);
            if (shop) {
                shop.employees.push({ name: employeeName, entryBase: "09:00", exitBase: "17:00", entryLabel: "09:00 صباحاً", exitLabel: "05:00 مساءً" });
                await saveDataToFirebase();
                renderHomePage();
            }
        });
        document.querySelectorAll('.shop-card').forEach(card => {
            card.addEventListener('click', () => { renderShopPage(parseInt(card.getAttribute('data-shop-id'))); });
        });
    }
    
    function renderShopPage(shopId) {
        const shop = shopsData.find(s => s.id === shopId);
        if (!shop) return;
        let employeesHtml = '';
        shop.employees.forEach((emp, idx) => {
            employeesHtml += `<div class="employee-card" data-emp-index="${idx}" data-shop-id="${shop.id}"><div class="employee-avatar"><i class="fas fa-user-circle"></i></div><div class="employee-details"><div class="employee-name">${emp.name}</div><div class="employee-schedule"><span><i class="fas fa-sign-in-alt"></i> ${emp.entryLabel}</span><span><i class="fas fa-sign-out-alt"></i> ${emp.exitLabel}</span></div></div><i class="fas fa-arrow-left" style="color: #007aff;"></i></div>`;
        });
        const html = `<div class="main-header" style="background: linear-gradient(135deg, #2c3e66, #1e2f4b);"><div class="brand-name" style="font-size: 1.6rem;">${shop.name}</div><div class="subhead">قائمة الموظفين</div><div class="nav-buttons"><button class="btn-mini" id="backHomeFromShopBtn"><i class="fas fa-home"></i> الرئيسية</button></div></div>
            <div class="shop-header"><div class="shop-title"><i class="${shop.icon}"></i> ${shop.name}</div></div><div style="margin-bottom: 16px;"><i class="fas fa-users"></i> <strong>الموظفين (اضغط على أي موظف)</strong></div>${employeesHtml}<footer>${shop.name}</footer>`;
        document.getElementById('appRoot').innerHTML = html;
        document.getElementById('backHomeFromShopBtn').addEventListener('click', () => renderHomePage());
        document.querySelectorAll('.employee-card').forEach(card => {
            card.addEventListener('click', () => {
                const empIndex = parseInt(card.getAttribute('data-emp-index'));
                const sId = parseInt(card.getAttribute('data-shop-id'));
                const targetShop = shopsData.find(s => s.id === sId);
                if (targetShop && targetShop.employees[empIndex]) renderEmployeePage(targetShop.employees[empIndex], sId, empIndex);
            });
        });
    }
    
    async function renderEmployeePage(employee, returnShopId, employeeIndex) {
        const weeklyData = generateWeeklySchedule(employee.entryBase, employee.exitBase);
        const totalWeeklyMinutes = weeklyData.reduce((sum, day) => sum + getMinutesDifference(day.entryRaw, day.exitRaw), 0);
        const totalWeeklyText = minutesToHoursMinutes(totalWeeklyMinutes);
        let rowsHtml = '';
        for (const day of weeklyData) {
            rowsHtml += `<div class="week-row"><div class="day-cell"><i class="${day.dayIcon}"></i> ${day.dayName}</div><div class="date-cell">${day.date}</div><div class="entry-cell">${day.entryTime}</div><div class="exit-cell">${day.exitTime}</div></div>`;
        }
        const html = `<div class="main-header" style="background: linear-gradient(135deg, #1b4d7a, #1a3f62);"><div class="brand-name" style="font-size: 1.4rem;">الملف الشخصي</div><div class="subhead">تفاصيل دوام الموظف</div><div class="nav-buttons"><button class="btn-mini" id="backToShopFromEmpBtn"><i class="fas fa-store"></i> المتجر</button><button class="btn-mini" id="backHomeFromEmpBtn"><i class="fas fa-home"></i> الرئيسية</button></div></div>
            <div class="employee-profile"><div class="profile-avatar"><i class="fas fa-id-badge"></i></div><div class="profile-name">${employee.name}</div><div class="work-hours-card"><div class="daily-hours"><i class="fas fa-clock"></i> المعدل اليومي: ${getDailyWorkHoursText(employee.entryBase, employee.exitBase)}</div></div>
            <button class="delete-record-btn" id="deleteScheduleBtn"><i class="fas fa-trash-alt"></i> حذف تسجيلات الدوام</button></div>
            <div class="weekly-card"><div class="weekly-header"><i class="fas fa-table-list"></i><span>جدول الدوام الأسبوعي</span></div><div class="table-header-row"><div class="col-day">اليوم</div><div class="col-date">التاريخ</div><div class="col-entry">دخول</div><div class="col-exit">مغادرة</div></div>${rowsHtml}<div class="total-week-row"><i class="fas fa-calculator"></i> إجمالي ساعات الأسبوع: <strong>${totalWeeklyText}</strong></div></div><footer>${employee.name}</footer>`;
        document.getElementById('appRoot').innerHTML = html;
        document.getElementById('backToShopFromEmpBtn').addEventListener('click', () => renderShopPage(returnShopId));
        document.getElementById('backHomeFromEmpBtn').addEventListener('click', () => renderHomePage());
        document.getElementById('deleteScheduleBtn').addEventListener('click', async () => {
            if (confirm(`حذف تسجيلات دوام "${employee.name}"؟`)) {
                employee.entryBase = "09:00"; employee.exitBase = "17:00";
                employee.entryLabel = "09:00 صباحاً"; employee.exitLabel = "05:00 مساءً";
                await saveDataToFirebase();
                renderEmployeePage(employee, returnShopId, employeeIndex);
            }
        });
    }
    
    // بدء التطبيق مع Firebase
    window.addEventListener('firebaseReady', async () => {
        const savedData = await loadDataFromFirebase();
        if (savedData && savedData.length) {
            shopsData = savedData;
        } else {
            shopsData = getDefaultShopsData();
            await saveDataToFirebase();
        }
        renderHomePage();
    });
    
    // إذا تأخر Firebase نعرض البيانات الافتراضية مؤقتاً
    setTimeout(async () => {
        if (!shopsData.length) {
            shopsData = getDefaultShopsData();
            renderHomePage();
        }
    }, 2000);
</script>
</body>
</html>
