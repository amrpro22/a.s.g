    ];

    function ensureArray(val) {
        if (!val) return [];
        if (Array.isArray(val)) return val;
        if (typeof val === 'object') {
            return Object.keys(val)
                .sort((a, b) => Number(a) - Number(b))
                .map(k => val[k])
                .filter(item => item !== null && item !== undefined);
        }
        return [];
    }

    function generateAccessCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function getRandomIcon() { return availableIconsList[Math.floor(Math.random() * availableIconsList.length)].iconClass; }
    
    function getArabicDayName(date) { 
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"]; 
        return days[date.getDay()]; 
    }
    
    function formatDate(date) { 
        const year = date.getFullYear(); 
        const month = String(date.getMonth() + 1).padStart(2, '0'); 
        const day = String(date.getDate()).padStart(2, '0'); 
        return `${year}/${month}/${day}`; 
    }
    
    function formatDateTime(date) {
        return date.toLocaleString('ar-EG', { hour12: true });
    }
    
    function calculateTimeDifferenceInMinutes(checkinTime, checkoutTime) { 
        const checkin = new Date(checkinTime);
        const checkout = new Date(checkoutTime);
        const diffMs = checkout - checkin;
        const diffMinutes = Math.floor(diffMs / (1000 * 60));
        if (diffMinutes < 0) return 0;
        if (diffMinutes > 1440) return 0;
        return diffMinutes;
    }

    function normalizeAttendanceType(type) {
        const value = String(type || '').trim().toLowerCase();
        if (value === 'دخول' || value === 'check in' || value === 'checkin' || value === 'in') return 'دخول';
        if (value === 'خروج' || value === 'check out' || value === 'checkout' || value === 'out') return 'خروج';
        return type;
    }
    
    function formatMinutesToHoursAndMinutes(minutes) { 
        if (minutes <= 0) return '0 دقيقة'; 
        const hours = Math.floor(minutes / 60); 
        const mins = minutes % 60; 
        if (hours === 0) return mins + ' دقيقة'; 
        if (mins === 0) return hours + ' ساعة'; 
        return hours + ' ساعة و ' + mins + ' دقيقة'; 
    }
    
    function calculateTotalWorkMinutesForEmployee(employeeName, branchName) {
        const records = attendanceRecords
            .filter(r => r.employeeName === employeeName && r.branchName === branchName)
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        
        let totalMinutes = 0;
        let i = 0;
        while (i < records.length) {
            if (normalizeAttendanceType(records[i].type) === 'دخول') {
                for (let j = i + 1; j < records.length; j++) {
                    if (normalizeAttendanceType(records[j].type) === 'خروج') {
                        const minutes = calculateTimeDifferenceInMinutes(records[i].timestamp, records[j].timestamp);
                        if (minutes > 0 && minutes < 1440) {
                            totalMinutes += minutes;
                        }
                        i = j;
                        break;
                    }
                }
            }
            i++;
        }
        return totalMinutes;
    }
    
    async function updateAllEmployeesWorkHours() { 
        for (let shop of shopsData) {
            if (shop) {
                shop.employees = ensureArray(shop.employees);
                for (let emp of shop.employees) {
                    if (emp) {
                        emp.totalMinutes = calculateTotalWorkMinutesForEmployee(emp.name, shop.name);
                    }
                }
            }
        }
        await saveDataToFirebase();
    }
    
    function getEmployeeAttendanceRecords(employeeName, branchName) { 
        return attendanceRecords
            .filter(r => r.employeeName === employeeName && r.branchName === branchName)
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)); 
    }
    
    function groupAttendanceByDay(records) { 
        const grouped = {};
        const sortedRecords = records
            .slice()
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

        const getDayEntry = (timestamp) => {
            const dateObj = new Date(timestamp);
            const dateKey = formatDate(dateObj);
            if (!grouped[dateKey]) {
                grouped[dateKey] = {
                    date: dateKey,
                    dateObj: dateObj,
                    dayName: getArabicDayName(dateObj),
                    records: [],
                    pairedRecords: [],
                    openRecords: [],
                    orphanCheckoutRecords: [],
                    totalMinutes: 0
                };
            }
            return grouped[dateKey];
        };

        let openCheckin = null;

        sortedRecords.forEach(record => {
            getDayEntry(record.timestamp).records.push(record);
            const recordType = normalizeAttendanceType(record.type);

            if (recordType === 'دخول') {
                if (openCheckin) {
                    getDayEntry(openCheckin.timestamp).openRecords.push(openCheckin);
                }
                openCheckin = record;
            } else if (recordType === 'خروج') {
                if (openCheckin) {
                    getDayEntry(openCheckin.timestamp).pairedRecords.push({
                        checkin: openCheckin,
                        checkout: record
                    });
                    openCheckin = null;
                } else {
                    getDayEntry(record.timestamp).orphanCheckoutRecords.push(record);
                }
            }
        });

        if (openCheckin) {
            getDayEntry(openCheckin.timestamp).openRecords.push(openCheckin);
        }

        const result = Object.values(grouped).sort((a, b) => b.dateObj - a.dateObj);
        result.forEach(day => {
            day.totalMinutes = day.pairedRecords.reduce((sum, pair) => {
                return sum + calculateTimeDifferenceInMinutes(pair.checkin.timestamp, pair.checkout.timestamp);
            }, 0);
        });

        return result;
    }
    
    async function saveDataToFirebase() { 
        if (window.firebaseDB) {
            try { 
                await window.firebaseSet(window.firebaseRef(window.firebaseDB, 'shopsData'), shopsData); 
            } catch(e) {
                console.error("فشل حفظ بيانات الفروع والموظفين:", e);
                throw e;
            }
        }
    }
    
    async function loadDataFromFirebase() { 
        if (window.firebaseDB) {
            try { 
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, 'shopsData')); 
                if (snap.exists()) return snap.val(); 
            } catch(e) { console.warn(e); }
        }
        return null; 
    }
    
    async function loadAttendanceFromFirebase() { 
        if (window.firebaseDB) {
            try { 
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, 'attendanceRecords')); 
                const records = []; 
                if (snap.exists()) { 
                    const data = snap.val(); 
                    for (const key in data) records.push({id: key, ...data[key]}); 
                } 
                return records; 
            } catch(e) { console.warn(e); }
        }
        return []; 
    }
    
    async function loadFinancialReportsFromFirebase() {
        if (window.firebaseDB) {
            try {
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, 'financialReports'));
                const reports = [];
                if (snap.exists()) {
                    const data = snap.val();
                    for (const key in data) {
                        reports.push(normalizeFinancialReport({ id: key, ...data[key] }));
                    }
                }
                return reports.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            } catch(e) { console.warn(e); }
        }
        return [];
    }

    async function loadEmployeeNotesFromFirebase() {
        if (window.firebaseDB) {
            try {
                const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, 'employeeNotes'));
                const notes = [];
                if (snap.exists()) {
                    const data = snap.val();
                    for (const key in data) {
                        notes.push({ id: key, ...data[key] });
                    }
                }
                return notes.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
            } catch(e) { console.warn(e); }
        }
        return [];
    }
    
    async function saveAttendanceToFirebase() { 
        if (window.firebaseDB) {
            try {
                if (!attendanceRecords.length) {
                    await window.firebaseRemove(window.firebaseRef(window.firebaseDB, 'attendanceRecords'));
                    return;
                }

                const recordsObj = {}; 
                attendanceRecords.forEach(r => { if (r.id) recordsObj[r.id] = r; }); 
                await window.firebaseSet(window.firebaseRef(window.firebaseDB, 'attendanceRecords'), recordsObj);
            } catch(e) {
                console.error("فشل حفظ سجلات الحضور:", e);
                throw e;
            }
        }

    async function saveEmployeeNotesToFirebase() {
        if (window.firebaseDB) {
            try {
                if (!employeeNotes.length) {
                    await window.firebaseRemove(window.firebaseRef(window.firebaseDB, 'employeeNotes'));
                    return;
                }

                const notesObj = {};
                employeeNotes.forEach(note => { if (note.id) notesObj[note.id] = note; });
                await window.firebaseSet(window.firebaseRef(window.firebaseDB, 'employeeNotes'), notesObj);
            } catch(e) {
                console.error("فشل حفظ تنبيهات الموظفين:", e);

    function normalizeComparableText(value) {
        return String(value || '')
            .trim()
            .replace(/\s+/g, ' ')
            .toLowerCase();
    }

    function getRecordEmployeeName(record) {
        return record?.employeeName || record?.name || record?.employee || record?.empName || '';
    }

    function getRecordBranchName(record) {
        return record?.branchName || record?.shopName || record?.branch || record?.shop || record?.storeName || '';
    }

    function matchesEmployeeBranch(record, employeeName = null, branchName = null, options = {}) {
        const recordEmployee = normalizeComparableText(getRecordEmployeeName(record));
        const recordBranch = normalizeComparableText(getRecordBranchName(record));
        const targetEmployee = normalizeComparableText(employeeName);
        const targetBranch = normalizeComparableText(branchName);
        const sameEmployee = employeeName === null || recordEmployee === targetEmployee;
        const sameBranch = branchName === null || recordBranch === targetBranch || (options.allowMissingBranch && !recordBranch);
        return sameEmployee && sameBranch;
    }

    async function removeMatchingFirebaseChildren(collectionName, matcher, normalizer = (value, key) => ({ id: key, ...value })) {
        if (!window.firebaseDB) return 0;

        const collectionRef = window.firebaseRef(window.firebaseDB, collectionName);
        const snap = await window.firebaseGet(collectionRef);
        if (!snap.exists()) return 0;

        const data = snap.val() || {};
        const keysToDelete = Object.keys(data).filter(key => matcher(normalizer(data[key] || {}, key)));

        await Promise.all(keysToDelete.map(key => 
            window.firebaseRemove(window.firebaseRef(window.firebaseDB, `${collectionName}/${key}`))
        ));

        return keysToDelete.length;
    }

    async function countMatchingAttendanceInFirebase(employeeName = null, branchName = null) {
        if (!window.firebaseDB) {
            return attendanceRecords.filter(record => 
                matchesEmployeeBranch(record, employeeName, branchName, { allowMissingBranch: employeeName !== null })
            ).length;
        }

        const snap = await window.firebaseGet(window.firebaseRef(window.firebaseDB, 'attendanceRecords'));
        if (!snap.exists()) return 0;

        const data = snap.val() || {};
        return Object.keys(data).filter(key => 
            matchesEmployeeBranch({ id: key, ...data[key] }, employeeName, branchName, { allowMissingBranch: employeeName !== null })
        ).length;
    }

    async function deleteAttendanceRecordsFor(employeeName = null, branchName = null) {
        const matcher = record => matchesEmployeeBranch(record, employeeName, branchName, { allowMissingBranch: employeeName !== null });
        let deletedCount = 0;

        if (window.firebaseDB) {
            deletedCount = await removeMatchingFirebaseChildren('attendanceRecords', matcher);
        }

        const beforeCount = attendanceRecords.length;
        attendanceRecords = attendanceRecords.filter(record => 
            !matcher(record)
        );
        const localDeletedCount = beforeCount - attendanceRecords.length;

        if (!window.firebaseDB && localDeletedCount > 0) {
            await saveAttendanceToFirebase();
        }

        return Math.max(deletedCount, localDeletedCount);
    }

    async function deleteAttendanceRecordsForEmployee(employeeName, branchName = null) {
        return deleteAttendanceRecordsFor(employeeName, branchName);
    }

    async function deleteEmployeeNotesFor(employeeName = null, branchName = null) {
        const matcher = note => matchesEmployeeBranch(note, employeeName, branchName);
        let deletedCount = 0;

        if (window.firebaseDB) {
            deletedCount = await removeMatchingFirebaseChildren('employeeNotes', matcher);
        }

        const beforeCount = employeeNotes.length;
        employeeNotes = employeeNotes.filter(note => !matcher(note));
        const localDeletedCount = beforeCount - employeeNotes.length;

        if (!window.firebaseDB && localDeletedCount > 0) {
            await saveEmployeeNotesToFirebase();
        }

        return Math.max(deletedCount, localDeletedCount);
    }

    async function deleteFinancialReportsFor(employeeName = null, branchName = null) {
        const matcher = report => matchesEmployeeBranch(report, employeeName, branchName);
        let deletedCount = 0;

        if (window.firebaseDB) {
            deletedCount = await removeMatchingFirebaseChildren('financialReports', matcher, (value, key) => normalizeFinancialReport({ id: key, ...value }));
        }

        const beforeCount = financialReports.length;
        financialReports = financialReports.filter(report => !matcher(report));
        const localDeletedCount = beforeCount - financialReports.length;

        if (!window.firebaseDB && localDeletedCount > 0) {
            await saveFinancialReportsToFirebase();
        }

        return Math.max(deletedCount, localDeletedCount);
    }

    function showToastMessage(message, isError = false) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.background = isError ? '#ef4444' : '#10b981';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);

    function getFriendlyAuthError(error) {

    function escapeReportValue(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

        const v = (key, fallback = '') => escapeReportValue(report[key] || fallback);

        const printWindow = window.open('', '_blank');

            showToastMessage("المتصفح منع نافذة الطباعة. اسمح بالنوافذ المنبثقة ثم حاول مرة أخرى", true);

    function filterReports(branchName, employeeName) {
        let filtered = [...financialReports];
        if (branchName) {
            filtered = filtered.filter(r => r.branchName === branchName);
        }
        if (employeeName) {
            filtered = filtered.filter(r => r.employeeName === employeeName);
        }
        
        const reportsList = document.getElementById('reportsList');

        const branchSearchInput = document.getElementById('branchSearchInput');
        const branchStatusFilter = document.getElementById('branchStatusFilter');
        const filterHomeBranches = () => {
            const term = (branchSearchInput?.value || '').trim().toLowerCase();
            const status = branchStatusFilter?.value || 'all';
            let visibleCount = 0;
            document.querySelectorAll('.shop-card').forEach(card => {
                const searchText = (card.getAttribute('data-search') || '').toLowerCase();
                const cardStatus = card.getAttribute('data-status') || 'quiet';
                const hasReports = card.getAttribute('data-has-reports') === '1';
                const hasOpenAttendance = card.getAttribute('data-open-attendance') === '1';
                const matchesSearch = !term || searchText.includes(term);
                const matchesStatus =
                    status === 'all' ||
                    (status === 'open' && hasOpenAttendance) ||
                    (status === 'reports' && hasReports) ||
                    (status === 'quiet' && cardStatus === 'quiet');
                const shouldShow = matchesSearch && matchesStatus;
                card.style.display = shouldShow ? 'flex' : 'none';
                if (shouldShow) visibleCount++;
            });
            const grid = document.getElementById('shopsGrid');
            let emptySearch = document.getElementById('emptySearchState');
            if (grid && !visibleCount && document.querySelectorAll('.shop-card').length) {
                if (!emptySearch) {
                    emptySearch = document.createElement('div');
                    emptySearch.id = 'emptySearchState';
                    emptySearch.className = 'empty-state';
                    emptySearch.innerHTML = '<i class="fas fa-filter-circle-xmark"></i> لا توجد فروع تطابق البحث';
                    grid.appendChild(emptySearch);
                }
                emptySearch.style.display = 'block';
            } else if (emptySearch) {
                emptySearch.style.display = 'none';
            }
        };
        if (branchSearchInput) branchSearchInput.addEventListener('input', filterHomeBranches);
        if (branchStatusFilter) branchStatusFilter.addEventListener('change', filterHomeBranches);

        const navAddEmployeeBtn = document.getElementById('navAddEmployeeBtn');

        if (navAddBranchBtn) navAddBranchBtn.addEventListener('click', () => showAddBranchModal(() => renderHomePage()));
        if (navAddEmployeeBtn) navAddEmployeeBtn.addEventListener('click', () => {
            document.getElementById('showAddEmployeeBtn')?.click();
            document.getElementById('addEmployeeForm')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        
        // إصلاح تفاعل إظهار واستقرار فورم الموظف دون اختفاء فوري
        document.getElementById('showAddEmployeeBtn').addEventListener('click', (e) => { 
            e.stopPropagation(); // منع تمدد الإيفنت
            const form = document.getElementById('addEmployeeForm');
            const select = document.getElementById('newEmployeeShop');
            let freshOptions = '';
            shopsData.forEach(shop => {
                if (shop) freshOptions += `<option value="${shop.id}">${shop.name}</option>`;
            });
            if (select) select.innerHTML = freshOptions;
            form.classList.toggle('active'); 
        });
        
        document.getElementById('confirmAddEmployeeBtn').addEventListener('click', async (e) => { 
            e.stopPropagation();
            const nameInput = document.getElementById('newEmployeeName'); 
            const shopSelect = document.getElementById('newEmployeeShop'); 
            const employeeName = nameInput.value.trim(); 
            const shopId = parseInt(shopSelect.value); 
            
            if (!employeeName) return showToastMessage("الرجاء إدخال الاسم", true); 
            if (isNaN(shopId)) return showToastMessage("الرجاء تحديد فرع صحيح أولاً", true);

            const shop = shopsData.find(s => s && String(s.id) === String(shopId)); 
            if (shop) { 
                shop.employees = ensureArray(shop.employees);
                const newPin = generateAccessCode(); 
                shop.employees.push({name: employeeName, accessCode: newPin, totalMinutes: 0}); 
                
                await saveDataToFirebase(); 
                nameInput.value = ''; 
                document.getElementById('addEmployeeForm').classList.remove('active'); 
                renderHomePage(); 
                showToastMessage(`تم إضافة الموظف بنجاح\nالرقم السري: ${newPin}`); 
            } else {
                showToastMessage("الفرع المحدد غير موجود", true);
            }
        });

        setupCardListeners();
    }

                    currentShopId = parseInt(card.getAttribute('data-shop-id'));

                }

        });

            btn.addEventListener('click', (e) => { 
                e.stopPropagation();

                if (confirm('هل تريد حذف الفرع وكل سجلات الحضور والتنبيهات والتقارير المرتبطة به؟')) {

    function getEmployeeNotesHistoryHTML(employeeName, branchName) {
        const notes = employeeNotes
            .filter(note => note.employeeName === employeeName && note.branchName === branchName)
            .sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));

        if (!notes.length) {
            return `
                <div class="notes-history">
                    <div class="notes-history-header">
                        <span><i class="fas fa-clock-rotate-left"></i> سجل التنبيهات</span>
                        <span class="notes-count-badge">0</span>
                    </div>
                    <div class="empty-notes-history">
                        لا توجد تنبيهات محفوظة لهذا الموظف
                    </div>
                </div>
            `;
        }

        const notesHtml = notes.map(note => {
            const noteDate = note.timestamp ? new Date(note.timestamp).toLocaleString('ar-EG') : 'تاريخ غير معروف';
            const readStatus = note.read ? 'مقروء' : 'غير مقروء';
            return `
                <div class="note-history-item" data-note-id="${note.id}">
                    <div>
                        <div class="note-history-content">${escapeReportValue(note.content || '')}</div>
                        <div class="note-history-meta">
                            <span><i class="fas fa-calendar"></i> ${noteDate}</span>
                            <span><i class="fas ${note.read ? 'fa-check-circle' : 'fa-circle'}"></i> ${readStatus}</span>
                        </div>
                    </div>
                    <button class="btn-delete-note" data-note-id="${note.id}" title="حذف التنبيه">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
        }).join('');

        return `
            <div class="notes-history">
                <div class="notes-history-header">
                    <span><i class="fas fa-clock-rotate-left"></i> سجل التنبيهات</span>
                    <span class="notes-count-badge">${notes.length}</span>
                </div>
                <div class="notes-history-list">
                    ${notesHtml}
                </div>
            </div>
        `;
    }

    function renderEmployeePage(employee, returnShopId, employeeIndex) { 
        currentView = 'employee'; 
        currentEmployeeData = employee; 
        currentEmployeeShopId = returnShopId; 
        currentEmployeeIndex = employeeIndex; 
        
        const shop = shopsData.find(s => s && String(s.id) === String(returnShopId)); 
        const records = getEmployeeAttendanceRecords(employee.name, shop?.name || ''); 
        const grouped = groupAttendanceByDay(records); 
        
        let totalMinutes = 0;
        grouped.forEach(day => {
            totalMinutes += day.totalMinutes || 0;
        });
        
        employee.totalMinutes = totalMinutes;
        saveDataToFirebase();
        
        const displayCodeProfile = (employee.accessCode && employee.accessCode.startsWith('hashed_')) ? 'مشفر: ' + employee.accessCode.substring(7, 15) : (employee.accessCode || '');

        let daysHtml = ''; 
        grouped.forEach(day => { 
            let rows = ''; 
            
            if (day.pairedRecords && day.pairedRecords.length > 0) {
                day.pairedRecords.forEach(pair => {
                    const ci = pair.checkin;
                    const co = pair.checkout;
                    const minutes = calculateTimeDifferenceInMinutes(ci.timestamp, co.timestamp);
                    const duration = formatMinutesToHoursAndMinutes(minutes);
                    const checkinDate = formatDate(new Date(ci.timestamp));
                    const checkoutDate = formatDate(new Date(co.timestamp));
                    const checkoutDisplay = checkinDate === checkoutDate
                        ? new Date(co.timestamp).toLocaleTimeString('ar-EG')
                        : `${new Date(co.timestamp).toLocaleTimeString('ar-EG')} <span style="display:block; font-size:0.65rem; color:#64748b;">${checkoutDate}</span>`;
                    rows += `
                    <tr>
                        <td class="time-in">${new Date(ci.timestamp).toLocaleTimeString('ar-EG')}</td>
                        <td class="time-out">${checkoutDisplay}</td>
                        <td style="color:var(--primary)">${duration}<\/td>
                    </tr>`;
                });
            }

            if (day.openRecords && day.openRecords.length > 0) {
                day.openRecords.forEach(record => {
                    rows += `
                    <tr style="background-color:#fffbeb;">
                        <td class="time-in">${new Date(record.timestamp).toLocaleTimeString('ar-EG')}</td>
                        <td style="color:#d97706; font-weight:800;">لم يسجل خروج بعد</td>
                        <td style="color:#d97706; font-weight:800;">مفتوح</td>
                    </tr>`;
                });
            }

            if (day.orphanCheckoutRecords && day.orphanCheckoutRecords.length > 0) {
                day.orphanCheckoutRecords.forEach(record => {
                    rows += `
                    <tr style="background-color:#fef2f2;">
                        <td style="color:#dc2626; font-weight:800;">لا يوجد دخول</td>
                        <td class="time-out">${new Date(record.timestamp).toLocaleTimeString('ar-EG')}</td>
                        <td style="color:#dc2626; font-weight:800;">غير مكتمل</td>
                    </tr>`;
                });
            }

            if (rows) {
                const dayTotalFormatted = formatMinutesToHoursAndMinutes(day.totalMinutes);
                rows += `<tr style="background-color:#f0fdf4; border-top:2px solid #4cc9b0;"><td colspan="2" style="font-weight:800; text-align:left;">إجمالي اليوم المكتمل</td><td style="font-weight:800; color:#10b981;">${dayTotalFormatted}</td></tr>`;
            } else {
                rows = '<tr><td colspan="3">لا توجد سجلات كاملة (دخول وخروج)</td></tr>';
            }
            
            daysHtml += `
            <div class="day-attendance-card">
                <div class="day-header">
                    <span class="day-name">${day.dayName}</span>
                    <span class="day-date">${day.date}</span>
                </div>
                <div class="table-responsive">
                    <table class="custom-table">
                        <thead><tr><th>دخول</th><th>خروج</th><th>المدة</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            </div>`; 
        });

        const deleteRecordsBtnHtml = records.length > 0 
            ? `<button id="clearEmployeeRecordsBtn" class="btn-header-action" style="background: rgba(247, 37, 133, 0.1); color: var(--danger); border: 1px solid rgba(247, 37, 133, 0.2);"><i class="fas fa-trash-can"></i> حذف السجلات</button>` 
            : '';
        const notesHistoryHtml = getEmployeeNotesHistoryHTML(employee.name, shop?.name || '');

        document.getElementById('appRoot').innerHTML = `
            <div class="main-header">
                <button class="btn-icon" id="globalBackBtn"><i class="fas fa-arrow-right"></i></button>
                <div class="brand-text" style="text-align:center; flex:1">
                    <h1>ملف الموظف</h1>
                </div>
                <button id="showReportsBtn" class="btn-header-action" style="background: var(--warning); color: white;"><i class="fas fa-chart-line"></i> تقارير الجرد</button>
            </div>
            <div class="app-container">
                <div class="profile-header">
                    <div class="profile-avatar-large"><i class="fas fa-user"></i></div>
                    <h2>${employee.name}</h2>
                    <p style="opacity:0.8; font-size:0.9rem">كود الدخول: ${displayCodeProfile}</p>
                    <div class="total-hours-pill">
                        إجمالي العمل: ${formatMinutesToHoursAndMinutes(totalMinutes)}
                    </div>
                </div>
                
                <div class="alert-card">
                    <div class="alert-card-header">
                        <i class="fas fa-bell"></i>
                        <span>إرسال تنبيه / ملاحظة للموظف</span>
                    </div>
                    <textarea id="employeeNote" class="alert-textarea" placeholder="اكتب هنا أي تنبيه أو ملاحظة... ستصل فوراً إلى حساب الموظف"></textarea>
                    <button id="sendNoteBtn" class="btn-send-alert">
                        <i class="fas fa-paper-plane"></i> إرسال التنبيه
                    </button>
                    <div id="noteFeedback" style="font-size:0.7rem; margin-top:8px; text-align:center;"></div>
                    ${notesHistoryHtml}
                </div>
                
                <div class="section-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span><i class="fas fa-calendar-check"></i> سجل الحضور</span>
                    ${deleteRecordsBtnHtml}
                </div>
                ${daysHtml || '<div style="text-align:center; padding:20px; color:var(--text-muted)">لا يوجد سجلات حضور</div>'}
            </div>
        `;

        document.getElementById('globalBackBtn').addEventListener('click', () => renderShopPage(returnShopId));
        
        document.getElementById('showReportsBtn').addEventListener('click', () => {
            renderReportsPage(employee.name, shop?.name);
        });

        const sendBtn = document.getElementById('sendNoteBtn');
        const noteTextarea = document.getElementById('employeeNote');
        const noteFeedback = document.getElementById('noteFeedback');
        
        if (sendBtn && noteTextarea) {
            sendBtn.addEventListener('click', async () => {
                const noteContent = noteTextarea.value.trim();
                if (!noteContent) {
                    noteFeedback.innerHTML = '<span style="color:#f72585;"><i class="fas fa-exclamation-triangle"></i> الرجاء كتابة نص التنبيه أولاً</span>';
                    setTimeout(() => { noteFeedback.innerHTML = ''; }, 3000);
                    return;
                }
                
                const success = await sendNoteToEmployee(employee.name, shop?.name || '', noteContent);
                
                if (success) {
                    noteFeedback.innerHTML = '<span style="color:#10b981;"><i class="fas fa-check-circle"></i> تم إرسال التنبيه بنجاح إلى ' + employee.name + ' (سيظهر فوراً في حساب الموظف)</span>';
                    noteTextarea.value = '';
                    employeeNotes = await loadEmployeeNotesFromFirebase();
                    renderEmployeePage(employee, returnShopId, employeeIndex);
                    setTimeout(() => { if (noteFeedback) noteFeedback.innerHTML = ''; }, 4000);
                } else {
                    noteFeedback.innerHTML = '<span style="color:#f72585;"><i class="fas fa-exclamation-triangle"></i> حدث خطأ في الإرسال، تأكد من الاتصال</span>';
                    setTimeout(() => { noteFeedback.innerHTML = ''; }, 3000);
                }
            });
        }

        document.querySelectorAll('.btn-delete-note').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const noteId = btn.getAttribute('data-note-id');
                if (confirm('هل تريد حذف هذا التنبيه من سجل الموظف؟')) {
                    await deleteEmployeeNote(noteId);
                }
            });
        });
        
        const clearBtn = document.getElementById('clearEmployeeRecordsBtn');
        if (clearBtn) {
            clearBtn.addEventListener('click', async () => {
                if (confirm(`هل أنت متأكد من حذف جميع سجلات الحضور الخاصة بالموظف (${employee.name}) في فرع (${shop?.name || ''}) نهائياً؟ هذه العملية لا يمكن التراجع عنها.`)) {
                    clearBtn.disabled = true;
                    clearBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحذف...';
                    try {
                        const deletedCount = await deleteAttendanceRecordsForEmployee(employee.name, shop?.name || '');
                        const remainingInFirebase = await countMatchingAttendanceInFirebase(employee.name, null);
                        await updateAllEmployeesWorkHours();
                        
                        if (remainingInFirebase === 0) {
                            showToastMessage(`تم حذف ${deletedCount} سجل حضور نهائياً من قاعدة البيانات.`);
                        } else {
                            showToastMessage(`تم حذف ${deletedCount} سجل، لكن بقي ${remainingInFirebase} سجل غير مرتبط.`, true);
                        }
                        
                        renderEmployeePage(employee, returnShopId, employeeIndex);
                    } catch (err) {
                        console.error(err);
                        showToastMessage("حدث خطأ أثناء محاولة الحذف", true);
                        renderEmployeePage(employee, returnShopId, employeeIndex);
                    } finally {
                        clearBtn.disabled = false;
                        clearBtn.innerHTML = '<i class="fas fa-trash-can"></i> حذف السجلات';
                    }
                }
            });
        }
    }

                const oldName = shop.name;
                shop.name = newName;

                        if (r.branchName === oldName) r.branchName = newName;

        modal.innerHTML = `<div class="modal-content">
            <h3 style="margin-bottom:15px">تعديل بيانات الموظف</h3>
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">اسم الموظف</label>
                <input id="editEmployeeName" class="form-input" value="${employee.name}">
            </div>
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; text-align: right;">
                <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">كلمة المرور / كود الدخول</label>
                <input id="editEmployeeAccessCode" class="form-input" value="${currentCode}" placeholder="أدخل كلمة المرور الجديدة">
            </div>
            <div class="modal-buttons">
                <button class="btn-add modal-save">حفظ</button>
                <button class="btn-header-action modal-cancel">إلغاء</button>
            </div>
        </div>`;
        document.body.appendChild(modal);
        
        modal.querySelector('.modal-save').onclick = async () => {
            const newName = modal.querySelector('#editEmployeeName').value.trim();
            const newCode = modal.querySelector('#editEmployeeAccessCode').value.trim();
            if (newName && newCode) {
                const oldName = employee.name;
                const shop = shopsData.find(s => s && String(s.id) === String(shopId));
                const branchName = shop?.name || '';
                employee.name = newName;
                employee.accessCode = newCode;
                attendanceRecords.forEach(r => {
                    if (matchesEmployeeBranch(r, oldName, branchName)) r.employeeName = newName;
                });
                employeeNotes.forEach(note => {
                    if (matchesEmployeeBranch(note, oldName, branchName)) note.employeeName = newName;
                });
                financialReports.forEach(report => {
                    if (matchesEmployeeBranch(report, oldName, branchName)) report.employeeName = newName;
                });
                await saveDataToFirebase();
                await saveAttendanceToFirebase();
                await saveEmployeeNotesToFirebase();
                await saveFinancialReportsToFirebase();
                callback();
                modal.remove();
                showToastMessage("تم تحديث بيانات الموظف");
            } else {
                showToastMessage("الرجاء التأكد من تعبئة حقل الاسم وكلمة المرور", true);
            }
        };
        modal.querySelector('.modal-cancel').onclick = () => modal.remove();
    }

    function listenToFirebaseChanges() { 
        if (window.firebaseDB) { 
            window.firebaseOnValue(window.firebaseRef(window.firebaseDB, 'shopsData'), async (snap) => { 
                if (snap.exists()) {
                    const val = snap.val();
                    shopsData = ensureArray(val);
                    shopsData.forEach(shop => {
                        if (shop) shop.employees = ensureArray(shop.employees);
                    });
                } 
                await updateAllEmployeesWorkHours(); 
                refreshView();
            }); 
            
            window.firebaseOnValue(window.firebaseRef(window.firebaseDB, 'attendanceRecords'), async (snap) => { 
                const records = []; 
                if (snap.exists()) { 
                    const data = snap.val(); 
                    for (const key in data) records.push({id: key, ...data[key]}); 
                } 
                attendanceRecords = records; 
                await updateAllEmployeesWorkHours(); 
                refreshView();
            });
            
            window.firebaseOnValue(window.firebaseRef(window.firebaseDB, 'financialReports'), async (snap) => {
                const reports = [];
                if (snap.exists()) {
                    const data = snap.val();
                    for (const key in data) {
                        reports.push(normalizeFinancialReport({ id: key, ...data[key] }));
                    }
                }
                financialReports = reports.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                refreshView();
            });

            window.firebaseOnValue(window.firebaseRef(window.firebaseDB, 'employeeNotes'), async (snap) => {
                const notes = [];
                if (snap.exists()) {
                    const data = snap.val();
                    for (const key in data) {
                        notes.push({ id: key, ...data[key] });
                    }
                }
                employeeNotes = notes.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                if (currentView === 'employee') {
                    refreshView();
                }
            });
        } 
    }

    function refreshView() {
        if (currentView === 'home') renderHomePage(); 
        else if (currentView === 'shop') renderShopPage(currentShopId); 
        else if (currentView === 'employee') renderEmployeePage(currentEmployeeData, currentEmployeeShopId, currentEmployeeIndex);
        else if (currentView === 'reports') renderReportsPage(currentReportsFilter.employeeName, currentReportsFilter.branchName);
        else if (currentView === 'reportDetails') renderReportDetailsPage(currentReportDetailsId);
    }
    
    let appStarted = false; 
    const startApplication = async () => { 
        if (appStarted) return; 
        if (!currentAdminUser) {
            showAdminLoginPage();
            return;
        }
        appStarted = true; 
        
        const rawShops = await loadDataFromFirebase(); 
        const savedShops = ensureArray(rawShops);
        savedShops.forEach(shop => {
            if (shop) shop.employees = ensureArray(shop.employees);
        });

        const savedAttendance = await loadAttendanceFromFirebase(); 
        attendanceRecords = savedAttendance;
        
        const savedReports = await loadFinancialReportsFromFirebase();
        financialReports = savedReports;

        const savedNotes = await loadEmployeeNotesFromFirebase();
        employeeNotes = savedNotes;

        if (savedShops && savedShops.length > 0) { 
            shopsData = savedShops;
        } else { 
            shopsData = getDefaultShopsData(); 
            await saveDataToFirebase(); 
        } 
        await updateAllEmployeesWorkHours(); 
        listenToFirebaseChanges(); 
        renderHomePage(); 
    };

    function initializeAuthGate() {
        if (authObserverStarted) return;
        if (!window.firebaseAuth || !window.firebaseOnAuthStateChanged) {
            document.getElementById('appRoot').innerHTML = `
                <div class="loading-screen">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                    <p style="margin-top: 15px; font-weight: 700;">جاري تجهيز تسجيل الدخول...</p>
                </div>
            `;
            return;
        }

        authObserverStarted = true;
        window.firebaseOnAuthStateChanged(window.firebaseAuth, async (user) => {
            currentAdminUser = user;
            if (user) {
                await startApplication();
            } else {
                appStarted = false;
                shopsData = [];
                attendanceRecords = [];
                financialReports = [];
                employeeNotes = [];
                currentShopId = null;
                currentEmployeeData = null;
                currentEmployeeShopId = null;
                currentEmployeeIndex = null;
                currentReportDetailsId = null;
                showAdminLoginPage();
            }
        });
    }

    window.addEventListener('firebaseReady', initializeAuthGate); 
    setTimeout(() => { if (!authObserverStarted) initializeAuthGate(); }, 3000);
</script>
</body>
</html>
