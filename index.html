<body>
<div id="appRoot" class="app-container">
    <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> جاري تحميل البيانات...</div>
</div>

<script>
    let shopsData = [];
    let attendanceRecords = [];
    let currentView = 'home';
    let currentShopId = null;
    let currentEmployeeData = null;
    let currentEmployeeShopId = null;
    let currentEmployeeIndex = null;

    const availableIcons = [
        "fas fa-store", "fas fa-shopping-cart", "fas fa-mobile-alt", "fas fa-laptop",
        "fas fa-tshirt", "fas fa-shoe-prints", "fas fa-gift", "fas fa-ring",
        "fas fa-car", "fas fa-plane", "fas fa-hotel", "fas fa-coffee",
        "fas fa-pizza-slice", "fas fa-ice-cream", "fas fa-apple-alt", "fas fa-book"
    ];

    function generateAccessCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    function getRandomIcon() {
        return availableIcons[Math.floor(Math.random() * availableIcons.length)];
    }
    
    function getArabicDayName(date) {
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        return days[date.getDay()];
    }
    
    function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}/${month}/${day}`;
    }
    
    function calculateTimeDifferenceInMinutes(checkinTime, checkoutTime) {
        const date1 = new Date(checkinTime);
        const date2 = new Date(checkoutTime);
        const diffMinutes = (date2 - date1) / (1000 * 60);
        return Math.round(diffMinutes);
    }
    
    function formatMinutesToHoursAndMinutes(minutes) {
        if (minutes <= 0) return '0 دقيقة';
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        if (hours === 0) return `${mins} دقيقة`;
        if (mins === 0) return `${hours} ساعة`;
        return `${hours} ساعة و ${mins} دقيقة`;
    }
    
    function formatMinutesToHoursDecimal(minutes) {
        const hours = minutes / 60;
        return Math.round(hours * 10) / 10;
    }
    
    async function calculateWorkHoursForEmployee(employeeName, branchName) {
        const employeeRecords = attendanceRecords.filter(r => 
            r.employeeName === employeeName && r.branchName === branchName
        ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        
        const dailyMinutes = {
            "الأحد": 0, "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0
        };
        
        for (let i = 0; i < employeeRecords.length - 1; i++) {
            if (employeeRecords[i].type === 'دخول' && employeeRecords[i+1].type === 'خروج') {
                const date = new Date(employeeRecords[i].timestamp);
                const dayName = getArabicDayName(date);
                const minutes = calculateTimeDifferenceInMinutes(employeeRecords[i].timestamp, employeeRecords[i+1].timestamp);
                if (minutes > 0 && minutes < 1440) {
                    dailyMinutes[dayName] += minutes;
                }
            }
        }
        
        return dailyMinutes;
    }
    
    async function updateAllEmployeesWorkHours() {
        for (let shop of shopsData) {
            if (shop.employees) {
                for (let emp of shop.employees) {
                    emp.workMinutes = await calculateWorkHoursForEmployee(emp.name, shop.name);
                }
            }
        }
        await saveDataToFirebase();
    }
    
    function getEmployeeAttendanceRecords(employeeName, branchName) {
        return attendanceRecords
            .filter(r => r.employeeName === employeeName && r.branchName === branchName)
            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    }
    
    function groupAttendanceByDay(records) {
        const grouped = {};
        records.forEach(record => {
            const date = new Date(record.timestamp);
            const dateKey = formatDate(date);
            if (!grouped[dateKey]) {
                grouped[dateKey] = {
                    date: dateKey,
                    dateObj: date,
                    dayName: getArabicDayName(date),
                    records: []
                };
            }
            grouped[dateKey].records.push(record);
        });
        
        const sortedDays = Object.values(grouped).sort((a, b) => new Date(b.date) - new Date(a.date));
        return sortedDays;
    }
    
    async function saveDataToFirebase() {
        if (!window.firebaseDB) return;
        try {
            const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
            await window.firebaseSet(dbRef, shopsData);
        } catch (error) {
            console.warn("خطأ في حفظ البيانات:", error.message);
        }
    }
    
    async function loadDataFromFirebase() {
        if (!window.firebaseDB) return null;
        try {
            const dbRef = window.firebaseRef(window.firebaseDB, 'shopsData');
            const snapshot = await window.firebaseGet(dbRef);
            if (snapshot.exists()) return snapshot.val();
            return null;
        } catch (error) {
            console.warn("خطأ في جلب البيانات:", error.message);
            return null;
        }
    }
    
    async function loadAttendanceFromFirebase() {
        if (!window.firebaseDB) return [];
        try {
            const attendanceRef = window.firebaseRef(window.firebaseDB, 'attendanceRecords');
            const snapshot = await window.firebaseGet(attendanceRef);
            const records = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) {
                    records.push({ id: key, ...data[key] });
                }
            }
            records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            return records;
        } catch (error) {
            console.warn("خطأ في جلب سجل الحضور:", error.message);
            return [];
        }
    }
    
    function getDefaultShopsData() {
        const emptyMinutes = { "الأحد": 0, "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0 };
        return [
            { id: 1, name: "متجر الأندلس", icon: "fas fa-crown", desc: "أفخر التشكيلات", employees: [
                { name: "أحمد الشجاع", accessCode: "111111", workMinutes: {...emptyMinutes} },
                { name: "سارة المنصور", accessCode: "222222", workMinutes: {...emptyMinutes} }
            ]},
            { id: 2, name: "رواد الخليج", icon: "fas fa-ship", desc: "ريادة في البحر", employees: [
                { name: "خالد النقبي", accessCode: "333333", workMinutes: {...emptyMinutes} },
                { name: "لينا العتيبي", accessCode: "444444", workMinutes: {...emptyMinutes} }
            ]},
            { id: 3, name: "زهور الشجاع", icon: "fas fa-leaf", desc: "طبيعة ورفاهية", employees: [
                { name: "ريم الهاجري", accessCode: "555555", workMinutes: {...emptyMinutes} },
                { name: "ناصر العتيق", accessCode: "666666", workMinutes: {...emptyMinutes} }
            ]},
            { id: 4, name: "الدرة بلازا", icon: "fas fa-gem", desc: "فخامة وتميز", employees: [
                { name: "جمال السالم", accessCode: "777777", workMinutes: {...emptyMinutes} },
                { name: "هبة العبيد", accessCode: "888888", workMinutes: {...emptyMinutes} }
            ]},
            { id: 5, name: "نخبة الشرق", icon: "fas fa-chart-line", desc: "ريادة أعمال", employees: [
                { name: "ماجد الشهراني", accessCode: "999999", workMinutes: {...emptyMinutes} },
                { name: "نوال الغامدي", accessCode: "101010", workMinutes: {...emptyMinutes} }
            ]},
            { id: 6, name: "قمة الشجاع", icon: "fas fa-mountain", desc: "أعلى القمم", employees: [
                { name: "تركي العتيبي", accessCode: "111111", workMinutes: {...emptyMinutes} },
                { name: "جواهر القاسم", accessCode: "121212", workMinutes: {...emptyMinutes} }
            ]}
        ];
    }
    
    function showEditShopModal(shop, callback) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="edit-modal">
                <h3><i class="fas fa-edit"></i> تعديل اسم المحل</h3>
                <input type="text" id="editShopName" value="${shop.name.replace(/"/g, '&quot;')}" placeholder="أدخل الاسم الجديد">
                <div class="modal-buttons">
                    <button class="modal-save"><i class="fas fa-check"></i> حفظ</button>
                    <button class="modal-cancel"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#editShopName');
        input.focus();
        
        modal.querySelector('.modal-save').addEventListener('click', async () => {
            const newName = input.value.trim();
            if (newName && newName !== shop.name) {
                shop.name = newName;
                await saveDataToFirebase();
                if (callback) callback();
            }
            modal.remove();
        });
        
        modal.querySelector('.modal-cancel').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function showEditEmployeeModal(employee, shopId, callback) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="edit-modal">
                <h3><i class="fas fa-user-edit"></i> تعديل اسم الموظف</h3>
                <input type="text" id="editEmployeeName" value="${employee.name.replace(/"/g, '&quot;')}" placeholder="أدخل الاسم الجديد">
                <div class="modal-buttons">
                    <button class="modal-save"><i class="fas fa-check"></i> حفظ</button>
                    <button class="modal-cancel"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const input = modal.querySelector('#editEmployeeName');
        input.focus();
        
        modal.querySelector('.modal-save').addEventListener('click', async () => {
            const newName = input.value.trim();
            if (newName && newName !== employee.name) {
                const oldName = employee.name;
                employee.name = newName;
                
                for (let record of attendanceRecords) {
                    if (record.employeeName === oldName && record.branchName === shopsData.find(s => s.id === shopId)?.name) {
                        record.employeeName = newName;
                    }
                }
                await saveDataToFirebase();
                await saveAttendanceToFirebase();
                if (callback) callback();
            }
            modal.remove();
        });
        
        modal.querySelector('.modal-cancel').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function showAddBranchModal(callback) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="edit-modal">
                <h3><i class="fas fa-store"></i> إضافة فرع جديد</h3>
                <input type="text" id="newBranchName" placeholder="اسم الفرع الجديد">
                <input type="text" id="newBranchDesc" placeholder="وصف الفرع (اختياري)">
                <div class="modal-buttons">
                    <button class="modal-save"><i class="fas fa-plus"></i> إضافة</button>
                    <button class="modal-cancel"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const nameInput = modal.querySelector('#newBranchName');
        const descInput = modal.querySelector('#newBranchDesc');
        nameInput.focus();
        
        modal.querySelector('.modal-save').addEventListener('click', async () => {
            const newName = nameInput.value.trim();
            if (!newName) {
                alert('الرجاء إدخال اسم الفرع');
                return;
            }
            
            const newId = Math.max(...shopsData.map(s => s.id), 0) + 1;
            const emptyMinutes = { "الأحد": 0, "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0 };
            
            shopsData.push({
                id: newId,
                name: newName,
                icon: getRandomIcon(),
                desc: descInput.value.trim() || "فرع جديد",
                employees: []
            });
            
            await saveDataToFirebase();
            if (callback) callback();
            modal.remove();
            alert(`تم إضافة الفرع "${newName}" بنجاح`);
        });
        
        modal.querySelector('.modal-cancel').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }
    
    function addScrollEffect() {
        const header = document.querySelector('.main-header');
        if (header) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 10) header.classList.add('scrolled');
                else header.classList.remove('scrolled');
            });
        }
    }
    
    async function saveAttendanceToFirebase() {
        if (!window.firebaseDB || !attendanceRecords.length) return;
        try {
            const attendanceRef = window.firebaseRef(window.firebaseDB, 'attendanceRecords');
            const recordsObj = {};
            attendanceRecords.forEach(record => {
                if (record.id) recordsObj[record.id] = record;
            });
            await window.firebaseSet(attendanceRef, recordsObj);
        } catch (error) {
            console.warn("خطأ في حفظ سجل الحضور:", error.message);
        }
    }
    
    function renderHomePage() {
        currentView = 'home';
        if (!shopsData.length) return;
        const root = document.getElementById('appRoot');
        let shopOptions = '';
        shopsData.forEach(shop => { shopOptions += `<option value="${shop.id}">${shop.name}</option>`; });
        let shopsHtml = '';
        shopsData.forEach(shop => {
            const totalEmployees = shop.employees?.length || 0;
            shopsHtml += `<div class="shop-card" data-shop-id="${shop.id}">
                <div class="shop-icon"><i class="${shop.icon}"></i></div>
                <div class="shop-info">
                    <div class="shop-name-wrapper">
                        <div class="shop-name">${shop.name}</div>
                        <button class="edit-shop-btn" data-shop-id="${shop.id}" onclick="event.stopPropagation()"><i class="fas fa-pen"></i> تعديل</button>
                    </div>
                    <div class="shop-desc"><i class="fas fa-users" style="font-size:0.65rem; margin-left:3px;"></i> ${totalEmployees} موظف | ${shop.desc}</div>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </div>`;
        });
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="brand-name">الشجاع جروب</div>
                <div class="subhead">نظام إدارة الموظفين المتكامل</div>
                <div class="dashboard-badge"><i class="fas fa-wifi"></i> متصل بـ Firebase</div>
                <div class="back-button hidden" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="actions-bar">
                <div class="action-card-btn" id="addBranchBtn">
                    <i class="fas fa-store-plus"></i>
                    <span>إضافة فرع جديد</span>
                </div>
                <div class="action-card-btn" id="showAddEmployeeBtn">
                    <i class="fas fa-user-plus"></i>
                    <span>إضافة موظف جديد</span>
                </div>
            </div>
            
            <div class="add-employee-form" id="addEmployeeForm">
                <div class="form-title"><i class="fas fa-user-plus"></i><span>إضافة موظف جديد</span></div>
                <div class="form-row">
                    <input type="text" id="newEmployeeName" class="form-input" placeholder="اسم الموظف">
                    <select id="newEmployeeShop" class="form-select">${shopOptions}</select>
                    <button id="confirmAddEmployeeBtn" class="btn-add"><i class="fas fa-check"></i> تأكيد</button>
                </div>
            </div>
            
            <div class="section-title"><i class="fas fa-building"></i> المتاجر والفروع</div>
            <div class="shops-grid">
                ${shopsHtml}
            </div>
            <footer>يتم احتساب ساعات العمل تلقائياً من تسجيلات الدخول والخروج</footer>
        `;
        root.innerHTML = html;
        addScrollEffect();
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.add('hidden');
        
        const addEmployeeForm = document.getElementById('addEmployeeForm');
        let formVisible = false;
        
        document.getElementById('addBranchBtn').addEventListener('click', () => {
            showAddBranchModal(() => renderHomePage());
        });
        
        document.getElementById('showAddEmployeeBtn').addEventListener('click', () => {
            if (formVisible) {
                addEmployeeForm.classList.remove('active');
                formVisible = false;
            } else {
                addEmployeeForm.classList.add('active');
                formVisible = true;
            }
        });
        
        document.getElementById('confirmAddEmployeeBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('newEmployeeName');
            const shopSelect = document.getElementById('newEmployeeShop');
            const employeeName = nameInput.value.trim();
            const shopId = parseInt(shopSelect.value);
            if (!employeeName) { alert('الرجاء إدخال اسم الموظف'); return; }
            const shop = shopsData.find(s => s.id === shopId);
            if (shop) {
                const emptyMinutes = { "الأحد": 0, "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0 };
                const newCode = generateAccessCode();
                shop.employees.push({ 
                    name: employeeName, 
                    accessCode: newCode,
                    workMinutes: {...emptyMinutes}
                });
                await saveDataToFirebase();
                nameInput.value = '';
                addEmployeeForm.classList.remove('active');
                formVisible = false;
                renderHomePage();
                alert(`تم إضافة الموظف: ${employeeName}\nرمز الدخول: ${newCode}`);
            }
        });
        
        document.querySelectorAll('.shop-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.edit-shop-btn')) {
                    currentShopId = parseInt(card.getAttribute('data-shop-id'));
                    renderShopPage(currentShopId);
                }
            });
        });
        
        document.querySelectorAll('.edit-shop-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const shopId = parseInt(btn.getAttribute('data-shop-id'));
                const shop = shopsData.find(s => s.id === shopId);
                if (shop) showEditShopModal(shop, () => renderHomePage());
            });
        });
    }
    
    function renderShopPage(shopId) {
        currentView = 'shop';
        currentShopId = shopId;
        const shop = shopsData.find(s => s.id === shopId);
        if (!shop) return;
        let employeesHtml = '';
        shop.employees.forEach((emp, idx) => {
            const totalMinutes = Object.values(emp.workMinutes || {}).reduce((a, b) => a + b, 0);
            const totalHoursFormatted = formatMinutesToHoursAndMinutes(totalMinutes);
            employeesHtml += `
            <div class="employee-card" data-emp-index="${idx}" data-shop-id="${shop.id}">
                <div class="employee-avatar"><i class="fas fa-user-tie"></i></div>
                <div class="employee-details">
                    <div class="employee-name-wrapper">
                        <div class="employee-name">${emp.name}</div>
                        <button class="edit-employee-btn" data-emp-index="${idx}" onclick="event.stopPropagation()"><i class="fas fa-pen"></i> تعديل</button>
                    </div>
                    <div class="employee-hours">
                        <span><i class="fas fa-clock"></i> ${totalHoursFormatted}</span>
                    </div>
                    <div class="employee-pin"><i class="fas fa-key"></i> ${emp.accessCode}</div>
                </div>
                <i class="fas fa-chevron-left arrow-icon"></i>
            </div>`;
        });
        
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-icon">
                    <i class="${shop.icon}"></i>
                </div>
                <div class="brand-name" style="font-size: 1.4rem;">${shop.name}</div>
                <div class="subhead">إدارة طاقم العمل وسجل الحضور</div>
                <div class="back-button" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="shop-header">
                <div class="shop-title"><i class="${shop.icon}"></i> ${shop.name}</div>
                <div style="color:#667eea; font-weight:600; font-size:0.8rem;"><i class="fas fa-users"></i> ${shop.employees.length} موظف</div>
            </div>
            
            <div class="section-title"><i class="fas fa-id-card-clip"></i> قائمة الموظفين</div>
            <div class="employees-grid">
                ${employeesHtml || '<div class="no-data">لا يوجد موظفين في هذا الفرع</div>'}
            </div>
            
            <footer>اختر موظفاً لعرض سجل الحضور والانصراف المفصل</footer>
        `;
        document.getElementById('appRoot').innerHTML = html;
        addScrollEffect();
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.remove('hidden');
        backBtn.addEventListener('click', () => renderHomePage());
        
        document.querySelectorAll('.employee-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.edit-employee-btn')) {
                    const empIndex = parseInt(card.getAttribute('data-emp-index'));
                    const sId = parseInt(card.getAttribute('data-shop-id'));
                    currentEmployeeShopId = sId;
                    currentEmployeeIndex = empIndex;
                    const targetShop = shopsData.find(s => s.id === sId);
                    if (targetShop && targetShop.employees[empIndex]) {
                        currentEmployeeData = targetShop.employees[empIndex];
                        renderEmployeePage(currentEmployeeData, sId, empIndex);
                    }
                }
            });
        });
        
        document.querySelectorAll('.edit-employee-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const empIndex = parseInt(btn.getAttribute('data-emp-index'));
                const sId = shopId;
                const targetShop = shopsData.find(s => s.id === sId);
                if (targetShop && targetShop.employees[empIndex]) {
                    showEditEmployeeModal(targetShop.employees[empIndex], sId, () => renderShopPage(shopId));
                }
            });
        });
    }
    
    function renderEmployeePage(employee, returnShopId, employeeIndex) {
        currentView = 'employee';
        currentEmployeeData = employee;
        currentEmployeeShopId = returnShopId;
        currentEmployeeIndex = employeeIndex;
        
        const totalMinutes = Object.values(employee.workMinutes || {}).reduce((a, b) => a + b, 0);
        const totalHoursFormatted = formatMinutesToHoursAndMinutes(totalMinutes);
        const totalHoursDecimal = formatMinutesToHoursDecimal(totalMinutes);
        
        const shop = shopsData.find(s => s.id === returnShopId);
        const employeeRecords = getEmployeeAttendanceRecords(employee.name, shop?.name || '');
        const groupedDays = groupAttendanceByDay(employeeRecords);
        
        let daysHtml = '';
        
        groupedDays.forEach(day => {
            const checkins = day.records.filter(r => r.type === 'دخول').sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const checkouts = day.records.filter(r => r.type === 'خروج').sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            let tableRows = '';
            const maxPairs = Math.max(checkins.length, checkouts.length);
            
            for (let i = 0; i < maxPairs; i++) {
                const checkin = checkins[i];
                const checkout = checkouts[i];
                
                let checkinTime = '—';
                let checkoutTime = '—';
                let durationText = '—';
                let durationMinutes = 0;
                
                if (checkin) {
                    checkinTime = new Date(checkin.timestamp).toLocaleTimeString('ar-EG');
                }
                if (checkout) {
                    checkoutTime = new Date(checkout.timestamp).toLocaleTimeString('ar-EG');
                }
                if (checkin && checkout) {
                    durationMinutes = calculateTimeDifferenceInMinutes(checkin.timestamp, checkout.timestamp);
                    durationText = formatMinutesToHoursAndMinutes(durationMinutes);
                } else if (checkin && !checkout) {
                    durationText = 'لم يخرج بعد';
                } else if (!checkin && checkout) {
                    durationText = 'دخول غير مسجل';
                }
                
                tableRows += `
                    <tr>
                        <td class="checkin-cell"><i class="fas fa-sign-in-alt checkin-icon"></i> ${checkinTime}</td>
                        <td class="checkout-cell"><i class="fas fa-sign-out-alt checkout-icon"></i> ${checkoutTime}</td>
                        <td class="duration-cell"><i class="fas fa-hourglass-half duration-icon"></i> ${durationText}</td>
                    </tr>
                `;
            }
            
            if (tableRows === '') {
                tableRows = '<tr><td colspan="3" class="no-data-cell">📭 لا توجد تسجيلات حضور في هذا اليوم</td></tr>';
            }
            
            daysHtml += `
                <div class="day-attendance-card">
                    <div class="day-table-header" data-day="${day.dayName}">
                        <div class="day-title">
                            <i class="fas fa-calendar-alt"></i>
                            <span>${day.dayName}</span>
                        </div>
                        <div class="day-date-badge">
                            <i class="far fa-calendar-check"></i> ${day.date}
                        </div>
                    </div>
                    <div class="attendance-table-wrapper">
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th><i class="fas fa-sign-in-alt"></i> وقت الدخول</th>
                                    <th><i class="fas fa-sign-out-alt"></i> وقت الخروج</th>
                                    <th><i class="fas fa-hourglass-half"></i> عدد الساعات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        });
        
        if (daysHtml === '') {
            daysHtml = '<div class="no-data">✨ لا توجد سجلات حضور لهذا الموظف</div>';
        }
        
        const html = `
            <div class="main-header" id="mainHeader">
                <div class="brand-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="brand-name" style="font-size: 1.3rem;">الملف الشخصي</div>
                <div class="subhead">سجل الحضور والانصراف</div>
                <div class="back-button" id="globalBackBtn"><i class="fas fa-arrow-right"></i></div>
            </div>
            
            <div class="employee-profile">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <div class="profile-name">${employee.name}</div>
                <div class="employee-pin" style="margin: 0 auto; display: inline-block;"><i class="fas fa-key"></i> ${employee.accessCode}</div>
                <br>
                <div class="total-hours-card">
                    <div class="total-hours-number">${totalHoursFormatted}</div>
                    <div class="total-hours-label">إجمالي ساعات العمل المسجلة (${totalHoursDecimal} ساعة)</div>
                </div>
            </div>
            
            <div class="attendance-days-container">
                ${daysHtml}
            </div>
            
            <footer>
                <i class="fas fa-check-circle" style="color: #34c759;"></i> الدخول &nbsp;&nbsp;
                <i class="fas fa-times-circle" style="color: #ff3b30;"></i> الخروج &nbsp;&nbsp;
                <i class="fas fa-chart-line" style="color: #667eea;"></i> المدة
            </footer>
        `;
        document.getElementById('appRoot').innerHTML = html;
        addScrollEffect();
        
        const backBtn = document.getElementById('globalBackBtn');
        if (backBtn) backBtn.classList.remove('hidden');
        backBtn.addEventListener('click', () => renderShopPage(returnShopId));
    }
    
    function listenToFirebaseChanges() {
        if (!window.firebaseDB) return;
        
        const shopsRef = window.firebaseRef(window.firebaseDB, 'shopsData');
        window.firebaseOnValue(shopsRef, async (snapshot) => {
            if (snapshot.exists()) shopsData = snapshot.val();
            await updateAllEmployeesWorkHours();
            if (currentView === 'home') renderHomePage();
            else if (currentView === 'shop' && currentShopId) renderShopPage(currentShopId);
            else if (currentView === 'employee' && currentEmployeeData && currentEmployeeShopId !== null && currentEmployeeIndex !== null) {
                const shop = shopsData.find(s => s.id === currentEmployeeShopId);
                if (shop && shop.employees[currentEmployeeIndex]) {
                    renderEmployeePage(shop.employees[currentEmployeeIndex], currentEmployeeShopId, currentEmployeeIndex);
                }
            }
        });
        
        const attendanceRef = window.firebaseRef(window.firebaseDB, 'attendanceRecords');
        window.firebaseOnValue(attendanceRef, async (snapshot) => {
            const records = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (const key in data) records.push({ id: key, ...data[key] });
            }
            records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            attendanceRecords = records;
            await updateAllEmployeesWorkHours();
            if (currentView === 'home') renderHomePage();
            else if (currentView === 'shop' && currentShopId) renderShopPage(currentShopId);
            else if (currentView === 'employee' && currentEmployeeData && currentEmployeeShopId !== null && currentEmployeeIndex !== null) {
                const shop = shopsData.find(s => s.id === currentEmployeeShopId);
                if (shop && shop.employees[currentEmployeeIndex]) {
                    renderEmployeePage(shop.employees[currentEmployeeIndex], currentEmployeeShopId, currentEmployeeIndex);
                }
            }
        });
    }
    
    let appStarted = false;
    const startApplication = async () => {
        if (appStarted) return;
        appStarted = true;
        
        try {
            const savedShops = await loadDataFromFirebase();
            const savedAttendance = await loadAttendanceFromFirebase();
            attendanceRecords = savedAttendance;
            
            if (savedShops && savedShops.length) {
                shopsData = savedShops;
                let updated = false;
                for (let shop of shopsData) {
                    if (shop.employees) {
                        for (let emp of shop.employees) {
                            if (!emp.accessCode) {
                                emp.accessCode = generateAccessCode();
                                updated = true;
                            }
                            if (!emp.workMinutes) {
                                emp.workMinutes = { "الأحد": 0, "الإثنين": 0, "الثلاثاء": 0, "الأربعاء": 0, "الخميس": 0, "الجمعة": 0, "السبت": 0 };
                                updated = true;
                            }
                        }
                    }
                }
                if (updated) await saveDataToFirebase();
            } else {
                shopsData = getDefaultShopsData();
                await saveDataToFirebase();
            }
            
            await updateAllEmployeesWorkHours();
            listenToFirebaseChanges();
            renderHomePage();
        } catch (error) {
            console.error("خطأ في التهيئة:", error);
            shopsData = getDefaultShopsData();
            renderHomePage();
        }
    };
    
    window.addEventListener('firebaseReady', startApplication);
    
    setTimeout(() => {
        if (!appStarted) {
            console.warn("تأخر Firebase، بدء التشغيل محلياً");
            startApplication();
        }
    }, 3000);
</script>
</body>
</html>
